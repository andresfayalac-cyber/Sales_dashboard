<script>
/**
 * Scripts.html
 * Frontend Logic for Sales Intelligence Dashboard
 */

const appState = {
    data: { overview: null, monthly: null, entities: null, productsLocations: null },
    charts: {}, 
    currentView: 'view-overview',
    globalTimeFilter: '1', // 'all', '12', '6', '3', '1'
    colors: {
        primaryDark: '#021640', primaryMid: '#0066CC', primaryLight: '#0099CC',
        accent1: '#4572C4', accent2: '#558ED5', success: '#1fa971',
        warning: '#f39c12', danger: '#e74c3c', muted: '#6c757d'
    },
    palette: ['#0066CC', '#0099CC', '#4572C4', '#558ED5', '#021640']
};

// ============================================================================
// FORMATTERS
// ============================================================================
const formatCurrency = (value, decimals = 2) => {
    if (value === null || value === undefined || isNaN(value)) return '$0.00';
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(value);
};

const formatCurrencyCompact = (value, decimals = 1) => {
    if (value === null || value === undefined || isNaN(value)) return '$0';
    return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        notation: 'compact',
        minimumFractionDigits: 0,
        maximumFractionDigits: decimals
    }).format(value);
};

const formatNumber = (value, decimals = 0) => {
    if (value === null || value === undefined || isNaN(value)) return '0';
    return new Intl.NumberFormat('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(value);
};

const formatPercent = (value, decimals = 1) => {
    if (value === null || value === undefined || isNaN(value)) return '0.0%';
    return new Intl.NumberFormat('en-US', { style: 'percent', minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(value);
};

const formatDate = (dateString) => {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString;
    return new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'short', day: 'numeric' }).format(date);
};

const formatMonth = (dateString) => {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString;
    return new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'short' }).format(date);
};

const formatMonthShort = (dateString) => {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString;
    return new Intl.DateTimeFormat('en-US', { year: '2-digit', month: 'short' }).format(date);
};

const OVERVIEW_TIME_LIMIT = {
    cutoffDate: new Date('2026-02-28T23:59:59'),
    cutoffMonthStart: new Date('2026-02-01T00:00:00'),
    cutoffDateLabel: 'Feb 28, 2026',
    cutoffMonthLabel: 'Feb 2026'
};

const toDateOrNull = (value) => {
    if (!value) return null;
    const cleanValue = typeof value === 'string' ? value.replace('Z', '') : value;
    const date = new Date(cleanValue);
    return isNaN(date.getTime()) ? null : date;
};

const monthStartFromDate = (date) => new Date(date.getFullYear(), date.getMonth(), 1);
const monthKeyFromDate = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;

const normalizeMonthlyRows = (rows = []) => {
    return rows
        .map(row => {
            const monthDateRaw = toDateOrNull(row.month_start);
            if (!monthDateRaw) return null;
            const monthDate = monthStartFromDate(monthDateRaw);
            if (monthDate > OVERVIEW_TIME_LIMIT.cutoffMonthStart) return null;
            return {
                ...row,
                sales: Number(row.sales) || 0,
                cost: Number(row.cost) || 0,
                expenses: Number(row.expenses) || 0,
                margin: Number(row.margin) || 0,
                profit: Number(row.profit) || 0,
                tx_count: Number(row.tx_count) || 0,
                monthDate,
                monthKey: monthKeyFromDate(monthDate)
            };
        })
        .filter(Boolean)
        .sort((a, b) => a.monthDate - b.monthDate);
};

const sumMetric = (rows = [], metric) => rows.reduce((sum, row) => sum + (Number(row[metric]) || 0), 0);

const summarizeMonthlyRows = (rows = []) => {
    const sales = sumMetric(rows, 'sales');
    const cost = sumMetric(rows, 'cost');
    const expenses = sumMetric(rows, 'expenses');
    const margin = sumMetric(rows, 'margin');
    const profit = sumMetric(rows, 'profit');
    const tx = sumMetric(rows, 'tx_count');
    return {
        sales,
        cost,
        expenses,
        margin,
        profit,
        tx,
        marginPct: sales > 0 ? margin / sales : 0,
        profitPct: sales > 0 ? profit / sales : 0,
        avgTicket: tx > 0 ? sales / tx : 0,
        negativeProfitMonths: rows.filter(row => (Number(row.profit) || 0) < 0).length
    };
};

const formatPeriodLabel = (rows = []) => {
    if (!rows.length) return 'No data available';
    if (rows.length === 1) return formatMonth(rows[0].month_start);
    return `${formatMonth(rows[0].month_start)} - ${formatMonth(rows[rows.length - 1].month_start)}`;
};

const getOverviewTimeContext = (monthlyRows = [], filterValue = appState.globalTimeFilter) => {
    const allRows = normalizeMonthlyRows(monthlyRows);

    if (!allRows.length) {
        const emptySummary = summarizeMonthlyRows([]);
        return {
            allRows: [],
            currentRows: [],
            previousRows: [],
            monthKeySet: new Set(),
            isAllTime: filterValue === 'all',
            comparisonAvailable: false,
            periodLabel: 'No data available',
            previousLabel: 'N/A',
            latestMonthDate: OVERVIEW_TIME_LIMIT.cutoffMonthStart,
            latestMonthLabel: OVERVIEW_TIME_LIMIT.cutoffMonthLabel,
            currentSummary: emptySummary,
            previousSummary: emptySummary
        };
    }

    const latestMonthDate = allRows[allRows.length - 1].monthDate;
    const latestMonthLabel = formatMonth(allRows[allRows.length - 1].month_start);

    if (filterValue === 'all') {
        const currentSummary = summarizeMonthlyRows(allRows);
        return {
            allRows,
            currentRows: allRows,
            previousRows: [],
            monthKeySet: new Set(allRows.map(row => row.monthKey)),
            isAllTime: true,
            comparisonAvailable: false,
            periodLabel: formatPeriodLabel(allRows),
            previousLabel: 'N/A',
            latestMonthDate,
            latestMonthLabel,
            currentSummary,
            previousSummary: summarizeMonthlyRows([])
        };
    }

    const monthsRequested = Math.max(1, parseInt(filterValue, 10) || 1);
    const endIndex = allRows.length - 1;
    const startIndex = Math.max(0, endIndex - monthsRequested + 1);
    const currentRows = allRows.slice(startIndex, endIndex + 1);
    const previousRows = startIndex > 0 ? allRows.slice(Math.max(0, startIndex - currentRows.length), startIndex) : [];
    const comparisonAvailable = previousRows.length === currentRows.length && previousRows.length > 0;

    return {
        allRows,
        currentRows,
        previousRows,
        monthKeySet: new Set(currentRows.map(row => row.monthKey)),
        isAllTime: false,
        comparisonAvailable,
        periodLabel: formatPeriodLabel(currentRows),
        previousLabel: formatPeriodLabel(previousRows),
        latestMonthDate,
        latestMonthLabel,
        currentSummary: summarizeMonthlyRows(currentRows),
        previousSummary: summarizeMonthlyRows(previousRows)
    };
};

const getLatestReferenceMonth = () => {
    const overviewRows = normalizeMonthlyRows((appState.data.overview && appState.data.overview.monthly_data) || []);
    return overviewRows.length ? overviewRows[overviewRows.length - 1].monthDate : OVERVIEW_TIME_LIMIT.cutoffMonthStart;
};

const calculatePercentDelta = (currentValue, previousValue) => {
    const prev = Number(previousValue) || 0;
    if (prev === 0) return null;
    return ((Number(currentValue) - prev) / Math.abs(prev)) * 100;
};

const formatSigned = (value, decimals = 1, suffix = '') => {
    const numericValue = Number(value) || 0;
    const sign = numericValue > 0 ? '+' : '';
    return `${sign}${numericValue.toFixed(decimals)}${suffix}`;
};

const getDeltaTone = (value) => {
    if (value > 0) return 'positive';
    if (value < 0) return 'negative';
    return 'neutral';
};

const setTextIfExists = (elementId, text) => {
    const el = document.getElementById(elementId);
    if (el) el.innerText = text;
};

const renderChartEmptyState = (containerId, message) => {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = `<div class="chart-empty-state">${message}</div>`;
};

const setOverviewKpiSubtitle = (elementId, context, deltaText, tone = 'neutral') => {
    const el = document.getElementById(elementId);
    if (!el) return;

    if (context.isAllTime) {
        el.innerHTML = `<span class="kpi-context-label">Cumulative through ${OVERVIEW_TIME_LIMIT.cutoffMonthLabel}</span>`;
        return;
    }

    if (!context.comparisonAvailable) {
        el.innerHTML = `<span class="kpi-context-label">${context.periodLabel} (no prior baseline)</span>`;
        return;
    }

    el.innerHTML = `<span class="kpi-delta ${tone}">${deltaText}</span> <span class="kpi-context-label">vs ${context.previousLabel}</span>`;
};

const setDriverRunnerUpSubtitle = (elementId, topValue, runnerUpValue, runnerUpName = null) => {
    const el = document.getElementById(elementId);
    if (!el) return;

    if (!topValue || !runnerUpValue || runnerUpValue <= 0) {
        el.innerHTML = `<span class="kpi-context-label">No runner-up available</span>`;
        return;
    }

    const pctDiff = ((topValue - runnerUpValue) / runnerUpValue) * 100;
    const tone = 'positive'; // Always positive since it's the top item
    const formattedDiff = `+${pctDiff.toFixed(1)}%`;
    const labelContext = runnerUpName ? `over ${runnerUpName} (runner-up)` : `over runner-up`;

    el.innerHTML = `<span class="kpi-delta ${tone}">${formattedDiff}</span> <span class="kpi-context-label">${labelContext}</span>`;
};

const normalizeRowsWithMonth = (rows = []) => {
    return rows
        .map(row => {
            const monthDateRaw = row.month_start ? toDateOrNull(row.month_start) : null;
            if (monthDateRaw && monthStartFromDate(monthDateRaw) > OVERVIEW_TIME_LIMIT.cutoffMonthStart) return null;
            const monthDate = monthDateRaw ? monthStartFromDate(monthDateRaw) : null;
            return {
                ...row,
                sales: Number(row.sales) || 0,
                profit: Number(row.profit) || 0,
                margin: Number(row.margin) || 0,
                monthKey: monthDate ? monthKeyFromDate(monthDate) : null
            };
        })
        .filter(Boolean);
};

const filterRowsByPeriod = (rows = [], monthKeySet = new Set()) => {
    const hasTimeDimension = rows.some(row => !!row.monthKey);
    if (!hasTimeDimension || monthKeySet.size === 0) {
        return { rows, hasTimeDimension };
    }
    return { rows: rows.filter(row => monthKeySet.has(row.monthKey)), hasTimeDimension };
};

const aggregateRowsByField = (rows = [], fieldName) => {
    const map = new Map();
    rows.forEach(row => {
        const rawKey = row[fieldName];
        const key = rawKey === null || rawKey === undefined ? '' : String(rawKey).trim();
        if (!key) return;
        if (!map.has(key)) map.set(key, { name: key, sales: 0, profit: 0, margin: 0 });
        const item = map.get(key);
        item.sales += Number(row.sales) || 0;
        item.profit += Number(row.profit) || 0;
        item.margin += Number(row.margin) || 0;
    });
    return Array.from(map.values());
};

const pickTopByMetric = (rows = [], metric = 'sales', index = 0) => {
    if (!rows.length) return null;
    return rows.slice().sort((a, b) => (Number(b[metric]) || 0) - (Number(a[metric]) || 0))[index] || null;
};

const pickFirstTextValue = (...values) => {
    for (const value of values) {
        if (value === null || value === undefined) continue;
        const text = String(value).trim();
        if (text) return text;
    }
    return '';
};

const buildOverviewTransactionRows = (rows = []) => {
    return rows.map((row, index) => {
        const product = pickFirstTextValue(row.product, row.item) || 'Unknown product';
        const location = pickFirstTextValue(row.location, row.store, row.region, row.city) || 'Unknown location';
        const seller = pickFirstTextValue(row.seller, row.seller_name, row.entity, row.entity_name, row.salesperson, row.agent) || 'Unknown seller';
        return {
            id: `${row.monthKey || row.month_start || 'no-month'}|${product}|${location}|${seller}|${index}`,
            product,
            location,
            seller,
            profit: Number(row.profit) || 0
        };
    });
};

const getTopAndBottomTransactions = (rows = [], limit = 4) => {
    if (!rows.length) return { top: [], bottom: [] };

    const sortedDesc = rows.slice().sort((a, b) => b.profit - a.profit);
    const top = sortedDesc.slice(0, limit);

    const topIds = new Set(top.map(row => row.id));
    const sortedAsc = rows.slice().sort((a, b) => a.profit - b.profit);
    const bottom = [];

    sortedAsc.forEach(row => {
        if (bottom.length >= limit) return;
        if (rows.length > limit && topIds.has(row.id)) return;
        bottom.push(row);
    });

    if (bottom.length < limit) {
        sortedAsc.forEach(row => {
            if (bottom.length >= limit) return;
            if (bottom.some(item => item.id === row.id)) return;
            bottom.push(row);
        });
    }

    return { top, bottom };
};

const renderOverviewTransactionsGrid = (containerId, topTransactions = [], bottomTransactions = []) => {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';

    const slots = [
        { tx: topTransactions[0] || null, tone: 'positive', rank: 1, label: 'Best Net Profit #1' },
        { tx: topTransactions[1] || null, tone: 'positive', rank: 2, label: 'Best Net Profit #2' },
        { tx: bottomTransactions[0] || null, tone: 'negative', rank: 1, label: 'Worst Net Profit #1' },
        { tx: bottomTransactions[1] || null, tone: 'negative', rank: 2, label: 'Worst Net Profit #2' }
    ];

    slots.forEach(slot => {
        const tx = slot.tx;

        const item = document.createElement('div');
        item.className = `kpi-card kpi-card-mini ov-transaction-item ${slot.tone}`;

        const rank = document.createElement('div');
        rank.className = `ov-transaction-rank ${slot.tone}`;
        rank.innerText = String(slot.rank);

        const meta = document.createElement('div');
        meta.className = 'ov-transaction-meta';

        const txType = document.createElement('div');
        txType.className = `ov-transaction-slot-label ${slot.tone}`;
        txType.innerText = slot.label;

        const product = document.createElement('div');
        product.className = 'ov-transaction-name';

        const seller = document.createElement('div');
        seller.className = 'ov-transaction-detail';

        const location = document.createElement('div');
        location.className = 'ov-transaction-detail';

        const profit = document.createElement('div');
        const profitTone = tx ? ((Number(tx.profit) || 0) >= 0 ? 'positive' : 'negative') : 'neutral';
        profit.className = `ov-transaction-profit ${profitTone}`;

        if (tx) {
            product.innerText = tx.product;
            seller.innerText = `Seller: ${tx.seller}`;
            location.innerText = `Location: ${tx.location}`;
            profit.innerText = `Net Profit: ${formatCurrency(tx.profit, 0)}`;
        } else {
            product.innerText = 'No transaction available';
            seller.innerText = 'Seller: N/A';
            location.innerText = 'Location: N/A';
            profit.innerText = 'Net Profit: N/A';
        }

        meta.appendChild(txType);
        meta.appendChild(product);
        meta.appendChild(seller);
        meta.appendChild(location);
        meta.appendChild(profit);

        item.appendChild(rank);
        item.appendChild(meta);
        container.appendChild(item);
    });
};

const buildOverviewInsights = (context, drivers, categoryMix = [], options = {}) => {
    const opportunities = [];
    const risks = [];
    const current = context.currentSummary;
    const previous = context.previousSummary;
    const periodLabel = context.periodLabel;
    const categoryDataMatchesPeriod = options.categoryDataMatchesPeriod !== false;
    const productDataMatchesPeriod = options.productDataMatchesPeriod !== false;
    const locationDataMatchesPeriod = options.locationDataMatchesPeriod !== false;

    const salesDelta = context.comparisonAvailable ? calculatePercentDelta(current.sales, previous.sales) : null;
    const profitDelta = context.comparisonAvailable ? calculatePercentDelta(current.profit, previous.profit) : null;
    const marginDeltaPp = context.comparisonAvailable ? (current.marginPct - previous.marginPct) * 100 : null;
    const avgTicketDelta = context.comparisonAvailable ? calculatePercentDelta(current.avgTicket, previous.avgTicket) : null;

    const addUnique = (arr, msg) => { if (!arr.includes(msg)) arr.push(msg); };

    if (context.comparisonAvailable && salesDelta !== null) {
        if (salesDelta >= 0) addUnique(opportunities, `Revenue is up ${formatSigned(salesDelta, 1, '%')} in ${periodLabel} vs ${context.previousLabel}.`);
        else addUnique(risks, `Revenue is down ${Math.abs(salesDelta).toFixed(1)}% in ${periodLabel} vs ${context.previousLabel}.`);
    }

    if (context.comparisonAvailable && profitDelta !== null) {
        if (profitDelta >= 0) addUnique(opportunities, `Net profit improved ${formatSigned(profitDelta, 1, '%')} versus ${context.previousLabel}.`);
        else addUnique(risks, `Net profit declined ${Math.abs(profitDelta).toFixed(1)}% versus ${context.previousLabel}.`);
    }

    if (context.comparisonAvailable && marginDeltaPp !== null) {
        if (marginDeltaPp >= 0) addUnique(opportunities, `Margin expanded ${formatSigned(marginDeltaPp, 1, ' p.p.')} over the same baseline.`);
        else addUnique(risks, `Margin compressed ${Math.abs(marginDeltaPp).toFixed(1)} p.p. against ${context.previousLabel}.`);
    }

    if (!context.comparisonAvailable) {
        addUnique(opportunities, `The active period (${periodLabel}) accumulates ${formatCurrency(current.sales, 0)} in revenue.`);
        addUnique(opportunities, `Net profit reaches ${formatCurrency(current.profit, 0)} with a ${formatPercent(current.profitPct)} profit rate.`);
    }

    const topCategory = categoryMix.length ? categoryMix[0] : null;
    if (categoryDataMatchesPeriod && topCategory && current.sales > 0) {
        const categoryShare = topCategory.sales / current.sales;
        addUnique(opportunities, `${topCategory.category} contributes ${formatPercent(categoryShare)} of sales in ${periodLabel}.`);
        if (categoryShare >= 0.5) addUnique(risks, `Category concentration is high: ${topCategory.category} represents ${formatPercent(categoryShare)} of sales.`);
    } else if (!categoryDataMatchesPeriod && topCategory) {
        addUnique(opportunities, `Category mix detail is currently available at all-history level through ${OVERVIEW_TIME_LIMIT.cutoffMonthLabel}.`);
    }

    if (productDataMatchesPeriod && drivers.topProduct && current.sales > 0) {
        const productShare = drivers.topProduct.sales / current.sales;
        addUnique(opportunities, `${drivers.topProduct.name} is the top revenue product with ${formatPercent(productShare)} of period sales.`);
        if (productShare >= 0.35) addUnique(risks, `Revenue concentration around ${drivers.topProduct.name} reaches ${formatPercent(productShare)} of total sales.`);
    }

    if (locationDataMatchesPeriod && drivers.topLocation && current.sales > 0) {
        const locationShare = drivers.topLocation.sales / current.sales;
        addUnique(opportunities, `${drivers.topLocation.name} leads location performance with ${formatPercent(locationShare)} of sales.`);
        if (locationShare >= 0.45) addUnique(risks, `Location dependency warning: ${drivers.topLocation.name} holds ${formatPercent(locationShare)} of revenue.`);
    }

    if (current.negativeProfitMonths > 0) {
        addUnique(risks, `${current.negativeProfitMonths} month(s) in ${periodLabel} closed with negative profit.`);
    }

    if (context.comparisonAvailable && avgTicketDelta !== null && avgTicketDelta < 0) {
        addUnique(risks, `Average ticket is down ${Math.abs(avgTicketDelta).toFixed(1)}% versus ${context.previousLabel}.`);
    }

    const expenseShare = current.sales > 0 ? current.expenses / current.sales : 0;
    if (expenseShare > 0.18) {
        addUnique(risks, `Operating expenses represent ${formatPercent(expenseShare)} of revenue in ${periodLabel}.`);
    }

    const defaultOpp = `Revenue totals ${formatCurrency(current.sales, 0)} during ${periodLabel}.`;
    if (opportunities.length < 3 && !opportunities.includes(defaultOpp)) {
        opportunities.push(defaultOpp);
    }
    const defaultRisk = `Keep monitoring cost and expense control for ${periodLabel}.`;
    if (risks.length < 3 && !risks.includes(defaultRisk)) {
        risks.push(defaultRisk);
    }

    return {
        opportunities: opportunities.slice(0, 3),
        risks: risks.slice(0, 3)
    };
};

// ============================================================================
// UTILITIES
// ============================================================================
const showLoading = (message = 'Loading data...') => {
    document.getElementById('loading-text').innerText = message;
    document.getElementById('loading-overlay').classList.remove('hidden');
};
const hideLoading = () => { document.getElementById('loading-overlay').classList.add('hidden'); };
const showError = (message, title = 'Oops! Something went wrong.') => {
    hideLoading();
    document.getElementById('error-title').innerText = title;
    document.getElementById('error-message').innerText = message;
    document.getElementById('error-container').classList.remove('hidden');
};
const clearError = () => { document.getElementById('error-container').classList.add('hidden'); };
const updateLastUpdated = () => {
    const now = new Date();
    document.getElementById('last-updated-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
};

const runGS = (functionName, ...args) => {
    return new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[functionName](...args);
    });
};

const destroyChartsByPrefix = (prefix) => {
    Object.keys(appState.charts).forEach(key => {
        if (key.startsWith(prefix)) {
            try { appState.charts[key].destroy(); } catch(e){}
            delete appState.charts[key];
        }
    });
};

const createChart = (containerId, options, chartKey) => {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    const defaultOptions = { chart: { fontFamily: 'Inter, sans-serif', toolbar: { show: false }, background: 'transparent' }, theme: { mode: 'light' }, colors: appState.palette };
    const finalOptions = deepMerge(defaultOptions, options);
    const chart = new ApexCharts(container, finalOptions);
    chart.render();
    appState.charts[chartKey] = chart;
};

const deepMerge = (target, source) => {
    const output = Object.assign({}, target);
    if (isObject(target) && isObject(source)) {
        Object.keys(source).forEach(key => {
            if (isObject(source[key])) {
                if (!(key in target)) Object.assign(output, { [key]: source[key] });
                else output[key] = deepMerge(target[key], source[key]);
            } else { Object.assign(output, { [key]: source[key] }); }
        });
    }
    return output;
};
const isObject = (item) => (item && typeof item === 'object' && !Array.isArray(item));

// ============================================================================
// INITIALIZATION & NAVIGATION
// ============================================================================
document.addEventListener('DOMContentLoaded', () => { initApp(); });

const initApp = async () => {
    bindEvents();
    showLoading('Initializing dashboard...');
    try {
        const bootstrapData = await runGS('getAppBootstrapData');
        if (bootstrapData.overview.error) throw new Error(bootstrapData.overview.error);
        appState.data.overview = bootstrapData.overview;
        updateLastUpdated();
        navigateTo('view-overview');
    } catch (error) { showError(error.message || 'Failed to initialize application.'); }
};

const bindEvents = () => {
    // Mobile Menu
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const toggleMenu = () => { if(sidebar) sidebar.classList.toggle('open'); if(overlay) overlay.classList.toggle('active'); };
    if(mobileBtn) mobileBtn.addEventListener('click', toggleMenu);
    if(overlay) overlay.addEventListener('click', toggleMenu);

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && sidebar && overlay) { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
            const targetView = e.currentTarget.getAttribute('data-target');
            navigateTo(targetView);
        });
    });

    // Global Time Filter
    const globalFilter = document.getElementById('global-time-filter');
    if (globalFilter) {
        globalFilter.addEventListener('change', (e) => {
            appState.globalTimeFilter = e.target.value;
            if (appState.currentView === 'view-overview') renderOverview(appState.data.overview, appState.data.productsLocations);
            if (appState.currentView === 'view-entities') renderEntities(appState.data.entities);
        });
    }

    document.getElementById('btn-refresh').addEventListener('click', async () => {
        showLoading('Refreshing data from Google Sheets...');
        try {
            const res = await runGS('refreshAllDashboardData');
            if (!res.success) throw new Error(res.message);
            appState.data = { overview: null, monthly: null, entities: null, productsLocations: null };
            await loadViewData(appState.currentView, true);
            updateLastUpdated();
            hideLoading();
        } catch (error) { showError(error.message || 'Failed to refresh data.'); }
    });

    document.getElementById('btn-error-close').addEventListener('click', clearError);

    const searchInput = document.getElementById('en-search-input');
    const sortSelect = document.getElementById('en-sort-select');
    if (searchInput) searchInput.addEventListener('input', renderEntitiesTable);
    if (sortSelect) sortSelect.addEventListener('change', renderEntitiesTable);

    let resizeDebounceTimer = null;
    window.addEventListener('resize', () => {
        if (resizeDebounceTimer) clearTimeout(resizeDebounceTimer);
        resizeDebounceTimer = setTimeout(() => {
            if (appState.currentView === 'view-overview' && appState.data.overview) {
                renderOverview(appState.data.overview, appState.data.productsLocations);
            }
            if (appState.currentView === 'view-entities' && appState.data.entities) {
                renderEntities(appState.data.entities);
            }
        }, 200);
    });
};

const navigateTo = async (viewId) => {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active', 'hidden'));
    document.querySelectorAll('.view-section').forEach(el => { if (el.id !== viewId) el.classList.add('hidden'); else el.classList.add('active'); });
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.nav-item[data-target="${viewId}"]`).classList.add('active');
    
    // Show/Hide Global Filter based on view
    const filterContainer = document.getElementById('global-filter-container');
    if (viewId === 'view-overview' || viewId === 'view-entities') {
        filterContainer.style.display = 'block';
    } else {
        filterContainer.style.display = 'none';
    }

    appState.currentView = viewId;
    await loadViewData(viewId);
};

const loadViewData = async (viewId, forceRender = false) => {
    try {
        switch (viewId) {
            case 'view-overview':
                if (!appState.data.overview) { showLoading('Loading Overview...'); appState.data.overview = await runGS('getOverviewData'); if (appState.data.overview.error) throw new Error(appState.data.overview.error); }
                if (!appState.data.productsLocations) {
                    appState.data.productsLocations = await runGS('getProductLocationData');
                    if (appState.data.productsLocations.error) throw new Error(appState.data.productsLocations.error);
                }
                renderOverview(appState.data.overview, appState.data.productsLocations);
                break;
            case 'view-monthly':
                if (!appState.data.monthly) { showLoading('Loading Monthly Trends...'); appState.data.monthly = await runGS('getMonthlyData'); if (appState.data.monthly.error) throw new Error(appState.data.monthly.error); }
                if (forceRender || !appState.charts['mo_main']) renderMonthly(appState.data.monthly);
                break;
            case 'view-entities':
                if (!appState.data.entities) { showLoading('Loading Clients...'); appState.data.entities = await runGS('getEntityData'); if (appState.data.entities.error) throw new Error(appState.data.entities.error); }
                renderEntities(appState.data.entities); // Always re-render to apply filter
                break;
            case 'view-products-locations':
                if (!appState.data.productsLocations) { showLoading('Loading Products & Locations...'); appState.data.productsLocations = await runGS('getProductLocationData'); if (appState.data.productsLocations.error) throw new Error(appState.data.productsLocations.error); }
                if (forceRender || !appState.charts['pl_prod_sales']) renderProductsLocations(appState.data.productsLocations);
                break;
        }
        hideLoading();
    } catch (error) { showError(error.message || `Failed to load data for ${viewId}.`); }
};

const renderOverview = (data, plData) => {
    if (!document.querySelector('#chart-overview-trend') || !data) return;

    destroyChartsByPrefix('ov_');

    const context = getOverviewTimeContext(data.monthly_data || [], appState.globalTimeFilter);
    const current = context.currentSummary;
    const previous = context.previousSummary;
    const isMobile = window.innerWidth <= 768;

    // KPIs
    setTextIfExists('ov-total-sales', formatCurrency(current.sales, 0));
    setTextIfExists('ov-total-cogs', formatCurrency(current.cost, 0));
    setTextIfExists('ov-total-expenses', formatCurrency(current.expenses, 0));
    setTextIfExists('ov-total-margin', formatCurrency(current.margin, 0));
    setTextIfExists('ov-total-profit', formatCurrency(current.profit, 0));

    setTextIfExists('ov-margin-pct', formatPercent(current.marginPct));
    setTextIfExists('ov-profit-pct', formatPercent(current.profitPct));
    setTextIfExists('ov-total-transactions', current.tx.toLocaleString());
    setTextIfExists('ov-avg-ticket', formatCurrency(current.avgTicket));

    const revenueDelta = context.comparisonAvailable ? calculatePercentDelta(current.sales, previous.sales) : null;
    const costDelta = context.comparisonAvailable ? calculatePercentDelta(current.cost, previous.cost) : null;
    const expensesDelta = context.comparisonAvailable ? calculatePercentDelta(current.expenses, previous.expenses) : null;
    const marginAbsDelta = context.comparisonAvailable ? calculatePercentDelta(current.margin, previous.margin) : null;
    const profitDelta = context.comparisonAvailable ? calculatePercentDelta(current.profit, previous.profit) : null;

    const marginDeltaPp = context.comparisonAvailable ? (current.marginPct - previous.marginPct) * 100 : null;
    const profitDeltaPp = context.comparisonAvailable ? (current.profitPct - previous.profitPct) * 100 : null;
    const txDelta = context.comparisonAvailable ? calculatePercentDelta(current.tx, previous.tx) : null;
    const ticketDelta = context.comparisonAvailable ? calculatePercentDelta(current.avgTicket, previous.avgTicket) : null;

    setOverviewKpiSubtitle('ov-sales-subtitle', context, revenueDelta === null ? 'n/a' : formatSigned(revenueDelta, 1, '%'), revenueDelta === null ? 'neutral' : getDeltaTone(revenueDelta));
    // For costs & expenses, lower is better, so tone is inversed: negative = 'positive', positive = 'negative'
    setOverviewKpiSubtitle('ov-cogs-subtitle', context, costDelta === null ? 'n/a' : formatSigned(costDelta, 1, '%'), costDelta === null ? 'neutral' : (costDelta > 0 ? 'negative' : 'positive'));
    setOverviewKpiSubtitle('ov-expenses-subtitle', context, expensesDelta === null ? 'n/a' : formatSigned(expensesDelta, 1, '%'), expensesDelta === null ? 'neutral' : (expensesDelta > 0 ? 'negative' : 'positive'));
    setOverviewKpiSubtitle('ov-margin-abs-subtitle', context, marginAbsDelta === null ? 'n/a' : formatSigned(marginAbsDelta, 1, '%'), marginAbsDelta === null ? 'neutral' : getDeltaTone(marginAbsDelta));
    setOverviewKpiSubtitle('ov-profit-subtitle', context, profitDelta === null ? 'n/a' : formatSigned(profitDelta, 1, '%'), profitDelta === null ? 'neutral' : getDeltaTone(profitDelta));

    setOverviewKpiSubtitle('ov-margin-subtitle', context, marginDeltaPp === null ? 'n/a' : formatSigned(marginDeltaPp, 1, ' p.p.'), marginDeltaPp === null ? 'neutral' : getDeltaTone(marginDeltaPp));
    setOverviewKpiSubtitle('ov-profit-pct-subtitle', context, profitDeltaPp === null ? 'n/a' : formatSigned(profitDeltaPp, 1, ' p.p.'), profitDeltaPp === null ? 'neutral' : getDeltaTone(profitDeltaPp));
    setOverviewKpiSubtitle('ov-transactions-subtitle', context, txDelta === null ? 'n/a' : formatSigned(txDelta, 1, '%'), txDelta === null ? 'neutral' : getDeltaTone(txDelta));
    setOverviewKpiSubtitle('ov-ticket-subtitle', context, ticketDelta === null ? 'n/a' : formatSigned(ticketDelta, 1, '%'), ticketDelta === null ? 'neutral' : getDeltaTone(ticketDelta));

    // Time context copy
    setTextIfExists('ov-active-period-note', `Active period: ${context.periodLabel}. Data available through ${OVERVIEW_TIME_LIMIT.cutoffDateLabel}.`);
    if (context.isAllTime) {
        setTextIfExists('ov-comparison-note', 'All Time shows cumulative values only; growth comparisons are intentionally hidden.');
    } else if (context.comparisonAvailable) {
        const baselineUnit = context.currentRows.length === 1 ? 'month' : `${context.currentRows.length}-month window`;
        setTextIfExists('ov-comparison-note', `Comparison baseline: ${context.previousLabel} (immediately preceding ${baselineUnit}).`);
    } else {
        setTextIfExists('ov-comparison-note', `No baseline available before ${context.periodLabel}; comparisons are disabled for this selection.`);
    }

    // Drivers
    const rawProductRows = normalizeRowsWithMonth((plData && plData.products && (plData.products.raw_rows || plData.products.list)) || []);
    const rawLocationRows = normalizeRowsWithMonth((plData && plData.locations && (plData.locations.raw_rows || plData.locations.list)) || []);

    const productWindow = filterRowsByPeriod(rawProductRows, context.monthKeySet);
    const locationWindow = filterRowsByPeriod(rawLocationRows, context.monthKeySet);
    const productDataMatchesPeriod = context.isAllTime || productWindow.hasTimeDimension;
    const locationDataMatchesPeriod = context.isAllTime || locationWindow.hasTimeDimension;
    const categoryDataMatchesPeriod = productDataMatchesPeriod;
    const transactionRows = buildOverviewTransactionRows(productWindow.rows);
    const transactionExtremes = getTopAndBottomTransactions(transactionRows, 2);

    setTextIfExists('ov-driver-primary-title', productDataMatchesPeriod ? 'Top Product by Revenue' : 'Top Product by Revenue (All History)');
    setTextIfExists('ov-driver-location-title', locationDataMatchesPeriod ? 'Top Ranked Location' : 'Top Ranked Location (All History)');
    setTextIfExists('ov-driver-contributor-title', productDataMatchesPeriod ? 'Highest Contributor' : 'Highest Contributor (All History)');

    let productAgg = aggregateRowsByField(productWindow.rows, 'product').sort((a, b) => b.sales - a.sales);
    let locationAgg = aggregateRowsByField(locationWindow.rows, 'location').sort((a, b) => b.sales - a.sales);

    if (!productAgg.length && plData && plData.products && Array.isArray(plData.products.list)) {
        productAgg = aggregateRowsByField(normalizeRowsWithMonth(plData.products.list), 'product').sort((a, b) => b.sales - a.sales);
    }
    if (!locationAgg.length && plData && plData.locations && Array.isArray(plData.locations.list)) {
        locationAgg = aggregateRowsByField(normalizeRowsWithMonth(plData.locations.list), 'location').sort((a, b) => b.sales - a.sales);
    }

    let categoryMix = aggregateRowsByField(productWindow.rows, 'category')
        .map(item => ({ category: item.name, sales: item.sales, profit: item.profit, margin: item.margin }))
        .filter(item => item.sales > 0)
        .sort((a, b) => b.sales - a.sales);

    if (!categoryMix.length && plData && plData.products && Array.isArray(plData.products.category_distribution)) {
        categoryMix = plData.products.category_distribution
            .map(item => ({
                category: item.category || 'Uncategorized',
                sales: Number(item.sales) || 0,
                profit: Number(item.profit) || 0,
                margin: Number(item.margin) || 0
            }))
            .filter(item => item.sales > 0)
            .sort((a, b) => b.sales - a.sales);
    }

    const topProductBySales = pickTopByMetric(productAgg, 'sales', 0);
    const runnerUpProductBySales = pickTopByMetric(productAgg, 'sales', 1);
    
    const topProductByProfit = pickTopByMetric(productAgg, 'profit', 0);
    const runnerUpProductByProfit = pickTopByMetric(productAgg, 'profit', 1);
    
    const topLocationBySales = pickTopByMetric(locationAgg, 'sales', 0);
    const runnerUpLocationBySales = pickTopByMetric(locationAgg, 'sales', 1);
    const secondaryScopeSuffix = productDataMatchesPeriod ? '' : ' (All History)';

    const topMarginCategories = categoryMix
        .map(item => ({ ...item, marginPct: item.sales > 0 ? item.margin / item.sales : 0 }))
        .sort((a, b) => b.marginPct - a.marginPct);
    const topMarginCategory = topMarginCategories[0] || null;
    const runnerUpMarginCategory = topMarginCategories[1] || null;

    setTextIfExists('ov-driver-product-sales', topProductBySales ? `${topProductBySales.name} (${formatCurrency(topProductBySales.sales, 0)})` : (data.top_product || 'N/A'));
    setDriverRunnerUpSubtitle('ov-driver-product-sales-sub', topProductBySales ? topProductBySales.sales : 0, runnerUpProductBySales ? runnerUpProductBySales.sales : 0, runnerUpProductBySales ? runnerUpProductBySales.name : null);

    if (topProductByProfit && Math.abs(topProductByProfit.profit) > 0.01) {
        setTextIfExists('ov-driver-secondary-title', `Top Product by Profit${secondaryScopeSuffix}`);
        setTextIfExists('ov-driver-product-profit', `${topProductByProfit.name} (${formatCurrency(topProductByProfit.profit, 0)})`);
        setDriverRunnerUpSubtitle('ov-driver-product-profit-sub', topProductByProfit.profit, runnerUpProductByProfit ? runnerUpProductByProfit.profit : 0, runnerUpProductByProfit ? runnerUpProductByProfit.name : null);
    } else if (topMarginCategory) {
        setTextIfExists('ov-driver-secondary-title', `Highest Margin Category${secondaryScopeSuffix}`);
        setTextIfExists('ov-driver-product-profit', `${topMarginCategory.category} (${formatPercent(topMarginCategory.marginPct)})`);
        setDriverRunnerUpSubtitle('ov-driver-product-profit-sub', topMarginCategory.marginPct, runnerUpMarginCategory ? runnerUpMarginCategory.marginPct : 0, runnerUpMarginCategory ? runnerUpMarginCategory.category : null);
    } else if (topProductBySales) {
        setTextIfExists('ov-driver-secondary-title', `Top Product by Revenue${secondaryScopeSuffix}`);
        setTextIfExists('ov-driver-product-profit', `${topProductBySales.name} (${formatCurrency(topProductBySales.sales, 0)})`);
        setDriverRunnerUpSubtitle('ov-driver-product-profit-sub', topProductBySales.sales, runnerUpProductBySales ? runnerUpProductBySales.sales : 0, runnerUpProductBySales ? runnerUpProductBySales.name : null);
    } else {
        setTextIfExists('ov-driver-secondary-title', `Highest Margin Category${secondaryScopeSuffix}`);
        setTextIfExists('ov-driver-product-profit', 'N/A');
        setDriverRunnerUpSubtitle('ov-driver-product-profit-sub', 0, 0);
    }

    setTextIfExists('ov-driver-location', topLocationBySales ? `${topLocationBySales.name} (${formatCurrency(topLocationBySales.sales, 0)})` : (data.top_location || 'N/A'));
    setDriverRunnerUpSubtitle('ov-driver-location-sub', topLocationBySales ? topLocationBySales.sales : 0, runnerUpLocationBySales ? runnerUpLocationBySales.sales : 0, runnerUpLocationBySales ? runnerUpLocationBySales.name : null);

    const contributorCandidates = ['seller', 'seller_name', 'entity', 'entity_name', 'salesperson', 'agent'];
    const contributorField = contributorCandidates.find(field => productWindow.rows.some(row => row[field] !== undefined && row[field] !== null && String(row[field]).trim() !== ''));
    
    let topContributor = null;
    let runnerUpContributor = null;
    if (contributorField) {
        const contributorAgg = aggregateRowsByField(productWindow.rows, contributorField);
        topContributor = pickTopByMetric(contributorAgg, 'sales', 0);
        runnerUpContributor = pickTopByMetric(contributorAgg, 'sales', 1);
    }
    
    setTextIfExists('ov-driver-seller', topContributor ? `${topContributor.name} (${formatCurrency(topContributor.sales, 0)})` : (data.top_entity || 'N/A'));
    setDriverRunnerUpSubtitle('ov-driver-seller-sub', topContributor ? topContributor.sales : 0, runnerUpContributor ? runnerUpContributor.sales : 0, runnerUpContributor ? runnerUpContributor.name : null);

    // Headline
    const headlineProduct = topProductBySales ? topProductBySales.name : (data.top_product || 'top product');
    const headlineLocation = topLocationBySales ? topLocationBySales.name : (data.top_location || 'top location');
    const driverScope = productDataMatchesPeriod && locationDataMatchesPeriod
        ? 'the active period'
        : `all available history through ${OVERVIEW_TIME_LIMIT.cutoffMonthLabel}`;
    let headlineText = "";
    if (context.isAllTime) {
        headlineText = `Historical performance through ${OVERVIEW_TIME_LIMIT.cutoffDateLabel} reached ${formatCurrency(current.sales, 0)} revenue and ${formatCurrency(current.profit, 0)} net profit.`;
    } else {
        const revDeltaStr = context.comparisonAvailable && revenueDelta !== null ? (revenueDelta > 0 ? `up ${revenueDelta.toFixed(1)}%` : `down ${Math.abs(revenueDelta).toFixed(1)}%`) : '';
        const profDeltaStr = context.comparisonAvailable && profitDelta !== null ? (profitDelta > 0 ? `up ${profitDelta.toFixed(1)}%` : `down ${Math.abs(profitDelta).toFixed(1)}%`) : '';
        const compStr = context.comparisonAvailable ? `, with revenue ${revDeltaStr} and profit ${profDeltaStr} versus the prior period` : '';
        headlineText = `${context.periodLabel} closed at ${formatCurrency(current.sales, 0)} revenue and ${formatCurrency(current.profit, 0)} net profit${compStr}.`;
    }
    
    const subheadlineText = context.comparisonAvailable
        ? `Top drivers in ${driverScope} are ${headlineProduct} and ${headlineLocation}; baseline comparison is ${context.previousLabel}.`
        : `Top drivers in ${driverScope} are ${headlineProduct} and ${headlineLocation}.`;

    setTextIfExists('ov-dynamic-headline', headlineText);
    setTextIfExists('ov-dynamic-subheadline', subheadlineText);

    setTextIfExists('ov-trend-caption', context.isAllTime ? `Historical Trend` : `Minimum 12 Months Context (ending ${context.periodLabel})`);
    if (context.isAllTime) {
        setTextIfExists('ov-transactions-caption', `Through ${OVERVIEW_TIME_LIMIT.cutoffMonthLabel}`);
    } else if (!productWindow.hasTimeDimension) {
        setTextIfExists('ov-transactions-caption', 'All available history');
    } else {
        setTextIfExists('ov-transactions-caption', context.periodLabel);
    }

    // Trend chart (force min 12 months)
    const minMonthsTrend = Math.max(12, context.isAllTime ? 1000 : parseInt(appState.globalTimeFilter));
    const trendDataRows = context.allRows.slice(-minMonthsTrend);

    if (!trendDataRows.length) {
        renderChartEmptyState('chart-overview-trend', `No monthly data available through ${OVERVIEW_TIME_LIMIT.cutoffDateLabel}.`);
    } else {
        const categories = trendDataRows.map(row => isMobile ? formatMonthShort(row.month_start) : formatMonth(row.month_start));
        const tickAmount = categories.length <= 1 ? 1 : Math.min(categories.length - 1, isMobile ? 3 : 8);

        createChart('chart-overview-trend', {
            series: [
                { name: 'Revenue', type: 'area', data: trendDataRows.map(row => Number(row.sales)||0) },
                { name: 'Profit', type: 'line', data: trendDataRows.map(row => Number(row.profit)||0) },
                { name: 'Margin %', type: 'line', data: trendDataRows.map(row => (Number(row.sales)||0) > 0 ? (Number(row.margin) / Number(row.sales)) * 100 : 0) },
                { name: 'Profit %', type: 'line', data: trendDataRows.map(row => (Number(row.sales)||0) > 0 ? (Number(row.profit) / Number(row.sales)) * 100 : 0) }
            ],
            chart: { height: isMobile ? 255 : 300, type: 'area' },
            stroke: { width: [2, 3, 2, 2], curve: 'smooth', dashArray: [0, 0, 4, 4] },
            fill: {
                type: ['gradient', 'solid', 'solid', 'solid'],
                gradient: { shadeIntensity: 1, opacityFrom: 0.22, opacityTo: 0.02, stops: [0, 90, 100] },
                opacity: [1, 1, 1, 1]
            },
            colors: [appState.colors.primaryMid, appState.colors.success, appState.colors.primaryLight, appState.colors.warning],
            dataLabels: { enabled: false },
            legend: { position: isMobile ? 'bottom' : 'top' },
            xaxis: {
                categories,
                tickAmount,
                labels: {
                    rotate: isMobile ? 0 : -30,
                    trim: true,
                    hideOverlappingLabels: true,
                    style: { fontSize: isMobile ? '9px' : '11px' }
                }
            },
            yaxis: [
                { seriesName: 'Revenue', labels: { formatter: (val) => formatCurrency(val, 0) } },
                { seriesName: 'Revenue', show: false },
                { opposite: true, seriesName: 'Margin %', labels: { formatter: (val) => val.toFixed(0) + '%' } },
                { opposite: true, seriesName: 'Margin %', show: false }
            ],
            grid: { padding: { left: 6, right: 8 } },
            tooltip: { 
                shared: true,
                intersect: false,
                y: { 
                    formatter: function(val, { seriesIndex }) {
                        if (seriesIndex < 2) return formatCurrency(val, 0);
                        return val.toFixed(1) + '%';
                    }
                } 
            }
        }, 'ov_trend');
    }

    renderOverviewTransactionsGrid('ov-transactions-grid', transactionExtremes.top, transactionExtremes.bottom);

    // Insights
    const insights = buildOverviewInsights(
        context,
        { topProduct: topProductBySales, topLocation: topLocationBySales },
        categoryMix,
        {
            categoryDataMatchesPeriod,
            productDataMatchesPeriod,
            locationDataMatchesPeriod
        }
    );

    const insightContext = context.comparisonAvailable
        ? `Window: ${context.periodLabel} | Baseline: ${context.previousLabel}`
        : `Window: ${context.periodLabel}`;

    setTextIfExists('ov-opp-context', insightContext);
    setTextIfExists('ov-risk-context', insightContext);
    const setInsightItem = (id, text) => {
        const el = document.getElementById(id);
        if (!el) return;
        const parentLi = el.closest('li');
        if (text) {
            el.innerText = text;
            if (parentLi) parentLi.style.display = 'flex';
        } else {
            if (parentLi) parentLi.style.display = 'none';
        }
    };

    setInsightItem('ov-opp-1', insights.opportunities[0]);
    setInsightItem('ov-opp-2', insights.opportunities[1]);
    setInsightItem('ov-opp-3', insights.opportunities[2]);
    setInsightItem('ov-risk-1', insights.risks[0]);
    setInsightItem('ov-risk-2', insights.risks[1]);
    setInsightItem('ov-risk-3', insights.risks[2]);
};

            { name: 'Cost', data: data.table_data.map(d => d.cost) }

        yaxis: { labels: { formatter: (val) => formatCurrency(val, 0) } },

        legend: { position: 'top' }
    }, 'mo_comp');

    createChart('chart-monthly-percentages', {
        series: [
            { name: 'Margin %', data: data.table_data.map(d => d.avg_margin_pct * 100) },
            { name: 'Profit %', data: data.table_data.map(d => d.avg_profit_pct * 100) }
        ],
        chart: { type: 'line', height: 300 },
        stroke: { width: 3, curve: 'smooth' },
        colors: [appState.colors.primaryLight, appState.colors.success],
        xaxis: xaxisConfig,
        yaxis: { labels: { formatter: (val) => val.toFixed(1) + '%' } },
        tooltip: { y: { formatter: (val) => val.toFixed(2) + '%' } }

};

const getEntityRowsForActivePeriod = (data, context) => {
    const allRows = Array.isArray(data.table_data) ? data.table_data.map(row => ({ ...row })) : [];
    if (context.isAllTime) return allRows;

    const months = Math.max(1, parseInt(appState.globalTimeFilter, 10) || 1);

    if (data.has_time_dimension && Array.isArray(data.raw_rows) && data.raw_rows.length) {
        const normalizedRaw = normalizeRowsWithMonth(data.raw_rows).map(row => ({
            ...row,
            entity_name: pickFirstTextValue(row.entity_name, row.entity, row.seller, row.seller_name) || 'Unknown client',
            sales: Number(row.sales) || 0,
            cost: Number(row.cost) || 0,
            expenses: Number(row.expenses) || 0,
            margin: Number(row.margin) || 0,
            profit: Number(row.profit) || 0,
            tx_count: Number(row.tx_count) || 0
        }));

        const periodRows = filterRowsByPeriod(normalizedRaw, context.monthKeySet).rows;
        const entityMap = new Map();

        periodRows.forEach(row => {
            const key = row.entity_name;
            if (!entityMap.has(key)) {
                entityMap.set(key, {
                    entity_name: key,
                    sales: 0,
                    cost: 0,
                    expenses: 0,
                    margin: 0,
                    profit: 0,
                    tx_count: 0,
                    last_sale_date: row.last_sale_date || row.month_start || null
                });
            }

            const item = entityMap.get(key);
            item.sales += row.sales;
            item.cost += row.cost;
            item.expenses += row.expenses;
            item.margin += row.margin;
            item.profit += row.profit;
            item.tx_count += row.tx_count;

            const candidateDate = toDateOrNull(row.last_sale_date) || toDateOrNull(row.month_start);
            const existingDate = toDateOrNull(item.last_sale_date);
            if (candidateDate && (!existingDate || candidateDate > existingDate)) {
                item.last_sale_date = row.last_sale_date || row.month_start;
            }
        });

        return Array.from(entityMap.values()).map(item => ({
            ...item,
            avg_margin_pct: item.sales > 0 ? item.margin / item.sales : 0,
            avg_profit_pct: item.sales > 0 ? item.profit / item.sales : 0
        }));
    }

    const referenceMonth = getLatestReferenceMonth();
    const cutoffDate = new Date(referenceMonth.getFullYear(), referenceMonth.getMonth() - months + 1, 1);
    return allRows.filter(row => {
        const rowDate = toDateOrNull(row.last_sale_date);
        return rowDate && rowDate >= cutoffDate && rowDate <= OVERVIEW_TIME_LIMIT.cutoffDate;
    });
};

const getClientStatusMeta = (row, referenceDate = OVERVIEW_TIME_LIMIT.cutoffDate) => {
    const lastDate = toDateOrNull(row.last_sale_date);
    if (!lastDate) {
        return { label: 'Inactive Risk', badge: 'danger', color: 'var(--danger)' };
    }

    const msPerDay = 1000 * 60 * 60 * 24;
    const daysSinceLastSale = Math.max(0, Math.floor((referenceDate - lastDate) / msPerDay));
    const profit = Number(row.profit) || 0;

    if (daysSinceLastSale <= 30 && profit > 0) {
        return { label: 'Growing', badge: 'success', color: 'var(--success)' };
    }
    if (daysSinceLastSale <= 75) {
        return { label: 'Stable', badge: 'primary', color: 'var(--primary-mid)' };
    }
    if (daysSinceLastSale <= 120) {
        return { label: 'At Risk', badge: 'warning', color: 'var(--warning)' };
    }
    return { label: 'Inactive Risk', badge: 'danger', color: 'var(--danger)' };
};

const setEntityInsightItem = (id, text) => {
