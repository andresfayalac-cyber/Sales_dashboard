                <td class="text-center">${formatPercent(row.avg_margin_pct)}</td>
                <td class="text-center" style="font-weight:500;">${formatPercent(row.avg_profit_pct)}</td>
                <td class="text-center">${formatPercent(salesShare)}</td>
            `;
            tbodyProd.appendChild(tr);
        });
    }

    if (productsMobileCards) {
        productsMobileCards.innerHTML = '';
        productAgg.forEach(row => {
            const salesShare = totalProductSales > 0 ? (Number(row.sales) || 0) / totalProductSales : 0;
            const card = document.createElement('article');
            card.className = 'pl-mobile-card';
            card.innerHTML = `
                <div class="pl-mobile-card-head">
                    <div class="pl-mobile-card-title">${row.product}</div>
                    <span class="badge badge-${row.segmentBadge || 'primary'}">${row.segmentLabel || 'Unclassified'}</span>
                </div>
                <div class="pl-mobile-card-metrics">
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Category</span><span class="pl-mobile-card-value">${row.category || 'Uncategorized'}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Sales</span><span class="pl-mobile-card-value">${formatCurrency(row.sales)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Profit</span><span class="pl-mobile-card-value" style="color:${(Number(row.profit) || 0) >= 0 ? 'var(--success)' : 'var(--danger)'};">${formatCurrency(row.profit)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Margin %</span><span class="pl-mobile-card-value">${formatPercent(row.avg_margin_pct)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Profit %</span><span class="pl-mobile-card-value">${formatPercent(row.avg_profit_pct)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Sales Share</span><span class="pl-mobile-card-value">${formatPercent(salesShare)}</span></div>
                </div>
            `;
            productsMobileCards.appendChild(card);
        });
    }

    const locationMap = new Map();
    const addLocationRow = (row) => {
        const location = pickFirstTextValue(row.location, row.store, row.region, row.city) || 'Unknown Location';
        if (!locationMap.has(location)) {
            locationMap.set(location, {
                location,
                sales: 0,
                margin: 0,
                profit: 0,
                tx_count: 0
            });
        }

        const item = locationMap.get(location);
        item.sales += Number(row.sales) || 0;
        item.margin += Number(row.margin) || 0;
        item.profit += Number(row.profit) || 0;
        item.tx_count += Number(row.tx_count) || 0;
    };

    if (hasLocationRawData) locationRawRows.forEach(addLocationRow);
    else locationList.forEach(addLocationRow);

    const locationAgg = Array.from(locationMap.values())
        .map(item => ({
            ...item,
            margin_pct: item.sales > 0 ? item.margin / item.sales : 0,
            avg_ticket: item.tx_count > 0 ? item.sales / item.tx_count : 0
        }))
        .sort((a, b) => (Number(b.sales) || 0) - (Number(a.sales) || 0));

    const totalLocationSales = locationAgg.reduce((sum, item) => sum + (Number(item.sales) || 0), 0);

    if (locationAgg.length) {
        createChart('chart-location-sales-profit', {
            series: [
                { name: 'Sales', data: locationAgg.map(item => Number(item.sales) || 0) },
                { name: 'Profit', data: locationAgg.map(item => Number(item.profit) || 0) }
            ],
            chart: {
                type: 'bar',
                height: 290,
                events: {
                    mounted: (chartCtx) => {
                        setTimeout(() => tuneLocationSalesProfitDataLabels(chartCtx && chartCtx.el), 0);
                    },
                    updated: (chartCtx) => {
                        setTimeout(() => tuneLocationSalesProfitDataLabels(chartCtx && chartCtx.el), 0);
                    }
                }
            },
            plotOptions: {
                bar: {
                    horizontal: false,
                    borderRadius: 3,
                    columnWidth: '52%',
                    dataLabels: { position: 'top' }
                }
            },
            colors: [appState.colors.primaryMid, appState.colors.success],
            xaxis: { categories: locationAgg.map(item => item.location) },
            yaxis: { labels: { formatter: (val) => formatCurrency(val, 0) } },
            tooltip: { y: { formatter: (val) => formatCurrency(val, 0) } },
            dataLabels: {
                enabled: true,
                offsetY: -6,
                formatter: (val) => formatCurrencyCompact(val, 1),
                style: {
                    fontSize: '10px',
                    fontWeight: '600',
                    colors: ['#0f172a']
                },
                background: { enabled: false }
            }
        }, 'pl_loc_sales_profit');

        createChart('chart-location-margin-ticket', {
            series: [
                { name: 'Margin %', type: 'column', data: locationAgg.map(item => (Number(item.margin_pct) || 0) * 100) },
                { name: 'Average Ticket', type: 'line', data: locationAgg.map(item => Number(item.avg_ticket) || 0) }
            ],
            chart: { type: 'line', height: 290, stacked: false },
            colors: [appState.colors.accent1, appState.colors.primaryDark],
            stroke: { width: [0, 3], curve: 'smooth' },
            markers: { size: [0, 4] },
            xaxis: { categories: locationAgg.map(item => item.location) },
            yaxis: [
                {
                    title: { text: 'Margin %' },
                    labels: { formatter: (val) => `${val.toFixed(0)}%` }
                },
                {
                    opposite: true,
                    title: { text: 'Average Ticket' },
                    labels: { formatter: (val) => formatCurrency(val, 0) }
                }
            ],
            tooltip: {
                shared: true,
                y: [
                    { formatter: (val) => `${(Number(val) || 0).toFixed(1)}%` },
                    { formatter: (val) => formatCurrency(val, 0) }
                ]
            }
        }, 'pl_loc_efficiency');
    } else {
        renderChartEmptyState('chart-location-sales-profit', `No location data available through ${OVERVIEW_TIME_LIMIT.cutoffMonthLabel}.`);
        renderChartEmptyState('chart-location-margin-ticket', `No location efficiency data available through ${OVERVIEW_TIME_LIMIT.cutoffMonthLabel}.`);
    }

    const tbodyLoc = document.getElementById('table-locations-body');
    const locationsMobileCards = document.getElementById('pl-locations-mobile-cards');
    if (tbodyLoc) {
        tbodyLoc.innerHTML = '';
        locationAgg.forEach(row => {
            const salesShare = totalLocationSales > 0 ? (Number(row.sales) || 0) / totalLocationSales : 0;
            const profitColor = (Number(row.profit) || 0) >= 0 ? 'var(--success)' : 'var(--danger)';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${row.location}</strong></td>
                <td class="text-right" style="font-weight:600;">${formatCurrency(row.sales)}</td>
                <td class="text-right" style="color:${profitColor}; font-weight:600;">${formatCurrency(row.profit)}</td>
                <td class="text-center">${formatPercent(row.margin_pct)}</td>
                <td class="text-right">${row.avg_ticket > 0 ? formatCurrency(row.avg_ticket) : 'N/A'}</td>
                <td class="text-center">${formatNumber(row.tx_count)}</td>
                <td class="text-center">${formatPercent(salesShare)}</td>
            `;
            tbodyLoc.appendChild(tr);
        });
    }

    if (locationsMobileCards) {
        locationsMobileCards.innerHTML = '';
        locationAgg.forEach(row => {
            const salesShare = totalLocationSales > 0 ? (Number(row.sales) || 0) / totalLocationSales : 0;
            const card = document.createElement('article');
            card.className = 'pl-mobile-card';
            card.innerHTML = `
                <div class="pl-mobile-card-head">
                    <div class="pl-mobile-card-title">${row.location}</div>
                    <span class="badge badge-primary">Location</span>
                </div>
                <div class="pl-mobile-card-metrics">
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Sales</span><span class="pl-mobile-card-value">${formatCurrency(row.sales)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Profit</span><span class="pl-mobile-card-value" style="color:${(Number(row.profit) || 0) >= 0 ? 'var(--success)' : 'var(--danger)'};">${formatCurrency(row.profit)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Margin %</span><span class="pl-mobile-card-value">${formatPercent(row.margin_pct)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Average Ticket</span><span class="pl-mobile-card-value">${row.avg_ticket > 0 ? formatCurrency(row.avg_ticket) : 'N/A'}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Transactions</span><span class="pl-mobile-card-value">${formatNumber(row.tx_count)}</span></div>
                    <div class="pl-mobile-card-metric"><span class="pl-mobile-card-label">Sales Share</span><span class="pl-mobile-card-value">${formatPercent(salesShare)}</span></div>
                </div>
            `;
            locationsMobileCards.appendChild(card);
        });
    }

    const matrixMap = new Map();
    productRawRows.forEach(row => {
        const product = pickFirstTextValue(row.product, row.item) || 'Unknown Product';
        const location = pickFirstTextValue(row.location, row.store, row.region, row.city) || 'Unknown Location';
        const category = pickFirstTextValue(row.category) || 'Uncategorized';
        const key = `${product}|||${location}`;

        if (!matrixMap.has(key)) {
            matrixMap.set(key, {
                product,
                location,
                category,
                sales: 0,
                margin: 0,
                profit: 0,
                tx_count: 0
            });
        }

        const item = matrixMap.get(key);
        item.sales += Number(row.sales) || 0;
        item.margin += Number(row.margin) || 0;
        item.profit += Number(row.profit) || 0;
        item.tx_count += Number(row.tx_count) || 0;
    });

    const matrixCells = Array.from(matrixMap.values()).map(item => ({
        ...item,
        margin_pct: item.sales > 0 ? item.margin / item.sales : 0,
        profit_pct: item.sales > 0 ? item.profit / item.sales : 0
    }));

    const matrixProducts = productAgg.slice(0, Math.min(10, productAgg.length)).map(item => item.product);
    const matrixLocations = locationAgg.slice(0, Math.min(5, locationAgg.length)).map(item => item.location);
    const matrixMetricSelect = document.getElementById('pl-matrix-metric');

    const buildMatrixColorScale = (metricKey, values = []) => {
        const safeValues = values.map(v => Number(v) || 0);

        if (metricKey === 'sales') {
            const max = Math.max(...safeValues, 0);
            if (max <= 0) {
                return {
                    ranges: [
                        { from: -1, to: 1, color: '#e2e8f0', name: 'No revenue signal' }
                    ]
                };
            }
            const cut1 = max * 0.33;
            const cut2 = max * 0.66;
            return {
                ranges: [
                    { from: 0, to: cut1, color: '#dbeafe', name: 'Low' },
                    { from: cut1 + 0.0001, to: cut2, color: '#60a5fa', name: 'Medium' },
                    { from: cut2 + 0.0001, to: max || 1, color: '#1d4ed8', name: 'High' }
                ]
            };
        }

        if (metricKey === 'profit') {
            const min = Math.min(...safeValues, 0);
            const max = Math.max(...safeValues, 0);

            if (max <= 0 && min >= 0) {
                return {
                    ranges: [
                        { from: -1, to: 1, color: '#e2e8f0', name: 'No profit signal' }
                    ]
                };
            }

            const positiveMid = max * 0.5;
            const ranges = [];

            if (min < 0) {
                ranges.push({ from: min, to: -0.0001, color: '#fca5a5', name: 'Negative' });
            }

            if (max > 0) {
                ranges.push({ from: 0, to: positiveMid, color: '#fde68a', name: 'Low' });
                ranges.push({ from: positiveMid + 0.0001, to: max, color: '#34d399', name: 'High' });
            } else {
                ranges.push({ from: 0, to: 1, color: '#e2e8f0', name: 'Neutral' });
            }

            return { ranges };
        }

        return {
            ranges: [
                { from: -100, to: -0.0001, color: '#f87171', name: 'Negative %' },
                { from: 0, to: 7, color: '#fde68a', name: '0% - 7%' },
                { from: 7.0001, to: 15, color: '#86efac', name: '7% - 15%' },
                { from: 15.0001, to: 100, color: '#16a34a', name: '> 15%' }
            ]
        };
    };

    const matrixMetricConfig = {
        sales: {
            label: 'Revenue intensity by product-market combination.',
            valueGetter: (item) => Number(item.sales) || 0,
            axisFormatter: (value) => formatCurrencyCompact(value, 1),
            metricText: (value) => formatCurrency(value, 0)
        },
        profit: {
            label: 'Profit contribution by product-market combination.',
            valueGetter: (item) => Number(item.profit) || 0,
            axisFormatter: (value) => formatCurrencyCompact(value, 1),
            metricText: (value) => formatCurrency(value, 0)
        },
        profit_pct: {
            label: 'Profitability by product-market combination.',
            valueGetter: (item) => (Number(item.profit_pct) || 0) * 100,
            axisFormatter: (value) => `${Number(value || 0).toFixed(0)}%`,
            metricText: (value) => `${Number(value || 0).toFixed(1)}%`
        }
    };

    const renderMatrix = (metricKey = 'sales') => {
        const resolvedKey = matrixMetricConfig[metricKey] ? metricKey : 'sales';
        const config = matrixMetricConfig[resolvedKey];
        const cellIndex = new Map(matrixCells.map(cell => [`${cell.product}|||${cell.location}`, cell]));

        const series = matrixLocations.map(location => ({
            name: location,
            data: matrixProducts.map(product => {
                const cell = cellIndex.get(`${product}|||${location}`) || {
                    product,
                    location,
                    sales: 0,
                    margin: 0,
                    profit: 0,
                    margin_pct: 0,
                    profit_pct: 0,
                    tx_count: 0
                };

                return {
                    x: product,
                    y: config.valueGetter(cell),
                    sales: Number(cell.sales) || 0,
                    profit: Number(cell.profit) || 0,
                    marginPct: Number(cell.margin_pct) || 0,
                    profitPct: Number(cell.profit_pct) || 0,
                    txCount: Number(cell.tx_count) || 0
                };
            })
        }));

        const values = [];
        series.forEach(row => row.data.forEach(cell => values.push(Number(cell.y) || 0)));

        setTextIfExists('pl-matrix-comment', `${config.label} ${activeMonthLabel}: top ${matrixProducts.length} products across ${matrixLocations.length} locations.`);

        createChart('chart-product-location-matrix', {
            series,
            chart: { type: 'heatmap', height: 420 },
            plotOptions: {
                heatmap: {
                    radius: 2,
                    enableShades: true,
                    shadeIntensity: 0.65,
                    colorScale: buildMatrixColorScale(resolvedKey, values)
                }
            },
            dataLabels: { enabled: false },
            stroke: { width: 1, colors: ['#ffffff'] },
            xaxis: {
                title: { text: 'Products' },
                labels: { rotate: -32, trim: true, style: { fontSize: '10px' } }
            },
            yaxis: { title: { text: 'Locations' } },
            legend: { position: 'top' },
            tooltip: {
                custom: ({ seriesIndex, dataPointIndex, w }) => {
                    const row = w.config.series[seriesIndex] || {};
                    const point = row.data ? row.data[dataPointIndex] : {};
                    return `<div style="padding: 10px 12px; min-width: 220px;">
                        <div style="font-weight: 600; color: #021640; margin-bottom: 4px;">${point.x || 'Product'} @ ${row.name || 'Location'}</div>
                        <div style="font-size: 12px; color: #64748b;">Selected metric: <strong>${config.metricText(point.y || 0)}</strong></div>
                        <div style="font-size: 12px; margin-top: 6px;">Revenue: <strong>${formatCurrency(point.sales || 0, 0)}</strong></div>
                        <div style="font-size: 12px;">Profit: <strong>${formatCurrency(point.profit || 0, 0)}</strong></div>
                        <div style="font-size: 12px;">Margin %: <strong>${formatPercent(point.marginPct || 0)}</strong></div>
                        <div style="font-size: 12px;">Profit %: <strong>${formatPercent(point.profitPct || 0)}</strong></div>
                    </div>`;
                }
            }
        }, 'pl_matrix_heatmap');
    };

    const hasMatrixSignal = matrixCells.some(item => (Number(item.sales) || 0) !== 0 || (Number(item.profit) || 0) !== 0);

    if (!matrixCells.length || !matrixProducts.length || !matrixLocations.length || !hasMatrixSignal) {
        setTextIfExists('pl-matrix-comment', `No product-location detail is available for ${activeMonthLabel}.`);
        renderChartEmptyState('chart-product-location-matrix', `No Product x Location combinations are available for ${activeMonthLabel}.`);
    } else {
        const defaultMetric = matrixMetricSelect && matrixMetricConfig[matrixMetricSelect.value]
            ? matrixMetricSelect.value
            : 'sales';
        if (matrixMetricSelect) {
            matrixMetricSelect.value = defaultMetric;
            matrixMetricSelect.onchange = () => renderMatrix(matrixMetricSelect.value);
        }
        renderMatrix(defaultMetric);
    }

    const categoryMap = new Map();
    productAgg.forEach(item => {
        const category = item.category || 'Uncategorized';
        if (!categoryMap.has(category)) {
            categoryMap.set(category, { category, sales: 0, profit: 0, margin: 0 });
        }
        const acc = categoryMap.get(category);
        acc.sales += Number(item.sales) || 0;
        acc.profit += Number(item.profit) || 0;
        acc.margin += Number(item.margin) || 0;
    });

    const totalCategorySales = Array.from(categoryMap.values()).reduce((sum, item) => sum + (Number(item.sales) || 0), 0);
    const totalCategoryProfit = Array.from(categoryMap.values()).reduce((sum, item) => sum + (Number(item.profit) || 0), 0);
    const categoryAgg = Array.from(categoryMap.values())
        .map(item => ({
            ...item,
            margin_pct: item.sales > 0 ? item.margin / item.sales : 0,
            profit_pct: item.sales > 0 ? item.profit / item.sales : 0,
            sales_share: totalCategorySales > 0 ? item.sales / totalCategorySales : 0,
            profit_share: totalCategoryProfit !== 0 ? item.profit / totalCategoryProfit : 0
        }))
        .sort((a, b) => (Number(b.sales) || 0) - (Number(a.sales) || 0));

    const matrixActiveCombos = matrixCells.filter(item => (Number(item.sales) || 0) > 0);
    const topComboByProfit = matrixActiveCombos
        .slice()
        .sort((a, b) => (Number(b.profit) || 0) - (Number(a.profit) || 0))[0] || null;
    const topComboBySales = matrixActiveCombos
        .slice()
        .sort((a, b) => (Number(b.sales) || 0) - (Number(a.sales) || 0))[0] || null;

    const comboSalesP75 = percentile(matrixActiveCombos.map(item => item.sales), 0.75);
    const comboProfitPctP40 = percentile(matrixActiveCombos.map(item => item.profit_pct), 0.4);
    const highSalesLowProfitabilityCombo = matrixActiveCombos
        .filter(item => (Number(item.sales) || 0) >= comboSalesP75 && (Number(item.profit_pct) || 0) <= comboProfitPctP40)
        .sort((a, b) => (Number(b.sales) || 0) - (Number(a.sales) || 0))[0] || null;

    const bestMarginLocation = locationAgg.slice().sort((a, b) => (Number(b.margin_pct) || 0) - (Number(a.margin_pct) || 0))[0] || null;
    const weakestMarginLocation = locationAgg.slice().sort((a, b) => (Number(a.margin_pct) || 0) - (Number(b.margin_pct) || 0))[0] || null;

    const topScaleProduct = (productsBySegment.scale || [])
        .slice()
        .sort((a, b) => (Number(b.profit) || 0) - (Number(a.profit) || 0))[0] || null;
    const topMarginRiskProduct = (productsBySegment.margin_risk || [])
        .slice()
        .sort((a, b) => (Number(b.sales) || 0) - (Number(a.sales) || 0))[0] || null;
    const topEfficientProduct = (productsBySegment.efficient || [])
        .slice()
        .sort((a, b) => (Number(b.avg_profit_pct) || 0) - (Number(a.avg_profit_pct) || 0))[0] || null;
    const weakestProduct = (productsBySegment.turnaround || [])
        .slice()
        .sort((a, b) => (Number(a.profit) || 0) - (Number(b.profit) || 0))[0] || null;

    const bestMarketForEfficient = topEfficientProduct
        ? matrixActiveCombos
            .filter(item => item.product === topEfficientProduct.product)
            .sort((a, b) => (Number(b.profit) || 0) - (Number(a.profit) || 0))[0] || null
        : null;

    const topCategory = categoryAgg[0] || null;

    const insights = [];
    const addInsight = (tone, text) => {
        if (!text) return;
        if (insights.some(item => item.text === text)) return;
        insights.push({ tone, text });
    };

    if (topScaleProduct) {
        addInsight(
            'positive',
            `${topScaleProduct.product} is a scale priority with ${formatCurrency(topScaleProduct.sales, 0)} revenue and ${formatCurrency(topScaleProduct.profit, 0)} profit.`
        );
    }

    if (topMarginRiskProduct) {
        addInsight(
            'warning',
            `${topMarginRiskProduct.product} drives volume but low profitability (${formatPercent(topMarginRiskProduct.avg_profit_pct)}). Review pricing, discount, and cost-to-serve.`
        );
    }

    if (topEfficientProduct) {
        const marketSuffix = bestMarketForEfficient
            ? `Best expansion market today: ${bestMarketForEfficient.location}.`
            : 'Look for market expansion where sell-through is strongest.';
        addInsight(
            'info',
            `${topEfficientProduct.product} is efficient (${formatPercent(topEfficientProduct.avg_profit_pct)} profit %) but underweighted (${formatPercent(totalProductSales > 0 ? topEfficientProduct.sales / totalProductSales : 0)} sales share). ${marketSuffix}`
        );
    }

    if (weakestProduct) {
        addInsight(
            'danger',
            `${weakestProduct.product} is underperforming (${formatCurrency(weakestProduct.profit, 0)} profit). Decide whether to correct mix/cost or reduce commercial focus.`
        );
    }

    if (topCategory) {
        addInsight(
            'info',
            `${topCategory.category} contributes ${formatPercent(topCategory.sales_share)} of sales and ${formatPercent(topCategory.profit_share)} of profit, so category strategy strongly impacts results.`
        );
    }

    if (bestMarginLocation && weakestMarginLocation && bestMarginLocation.location !== weakestMarginLocation.location) {
        addInsight(
            'warning',
            `${bestMarginLocation.location} leads margin (${formatPercent(bestMarginLocation.margin_pct)}), while ${weakestMarginLocation.location} is weaker (${formatPercent(weakestMarginLocation.margin_pct)}). Rebalance product mix by location.`
        );
    }

    if (topComboByProfit) {
        addInsight(
            'positive',
            `Top product-market combination by profit: ${topComboByProfit.product} in ${topComboByProfit.location} (${formatCurrency(topComboByProfit.profit, 0)} profit).`
        );
    }

    if (highSalesLowProfitabilityCombo && (!topComboBySales || highSalesLowProfitabilityCombo.product !== topComboBySales.product || highSalesLowProfitabilityCombo.location !== topComboBySales.location)) {
        addInsight(
            'warning',
            `Commercial correction opportunity: ${highSalesLowProfitabilityCombo.product} in ${highSalesLowProfitabilityCombo.location} has high revenue (${formatCurrency(highSalesLowProfitabilityCombo.sales, 0)}) but low profitability (${formatPercent(highSalesLowProfitabilityCombo.profit_pct)}).`
        );
    }

    for (let i = insights.length; i < 3; i++) {
        insights.push({
            tone: 'info',
            text: `Total product revenue in scope is ${formatCurrency(totalProductSales, 0)} across ${productAgg.length} products and ${locationAgg.length} locations.`
        });
    }

    const finalInsights = insights.slice(0, 5);
    renderStrategicInsightsList('pl-insights-list', finalInsights);

    setTextIfExists(
        'pl-insights-context',
        `Auto-generated for ${activeMonthLabel} from ${productAgg.length} products, ${locationAgg.length} locations, and ${matrixActiveCombos.length} active product-market combinations.`
    );
};
</script>
