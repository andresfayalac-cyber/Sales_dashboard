const renderEntities = (entityPayload) => {
    if (!document.querySelector('#chart-entities-sales')) return;
    destroyChartsByPrefix('en_');

    const isMobileView = window.innerWidth <= 768;
    const isSmallMobileView = window.innerWidth <= 480;

    const context = getOverviewTimeContext((appState.data.overview && appState.data.overview.monthly_data) || [], appState.globalTimeFilter);
    const filteredData = getEntityRowsForActivePeriod(entityPayload, context);

    const totalRevenue = filteredData.reduce((sum, row) => sum + (Number(row.sales) || 0), 0);
    const totalProfit = filteredData.reduce((sum, row) => sum + (Number(row.profit) || 0), 0);
    const totalTx = filteredData.reduce((sum, row) => sum + (Number(row.tx_count) || 0), 0);

    const sortedByRevenue = filteredData.slice().sort((a, b) => (Number(b.sales) || 0) - (Number(a.sales) || 0));
    const sortedByProfit = filteredData.slice().sort((a, b) => (Number(b.profit) || 0) - (Number(a.profit) || 0));
    const sortedByEfficiencyAll = filteredData.slice().sort((a, b) => (Number(b.avg_profit_pct) || 0) - (Number(a.avg_profit_pct) || 0));

    const topRevenueClient = sortedByRevenue[0] || null;
    const topProfitClient = sortedByProfit[0] || null;
    const top5Revenue = sortedByRevenue.slice(0, 5);
    const top5RevenueValue = top5Revenue.reduce((sum, row) => sum + (Number(row.sales) || 0), 0);
    const top5Share = totalRevenue > 0 ? top5RevenueValue / totalRevenue : 0;

    setTextIfExists('en-total-entities', formatNumber(filteredData.length));
    setTextIfExists('en-top-sales', topRevenueClient ? topRevenueClient.entity_name : '--');
    setTextIfExists('en-top-profit', topProfitClient ? topProfitClient.entity_name : '--');
    setTextIfExists('en-avg-sales', filteredData.length ? formatCurrency(totalRevenue / filteredData.length, 0) : '--');
    setTextIfExists('en-avg-tx', filteredData.length ? formatNumber(totalTx / filteredData.length, 1) : '--');
    setTextIfExists('en-top5-concentration', filteredData.length ? formatPercent(top5Share) : '--');

    if (!filteredData.length) {
        setTextIfExists('en-dynamic-subheadline', `In ${context.periodLabel}, no active client activity is available; expand the time window to recover portfolio signals.`);
        setTextIfExists('en-rankings-insight', 'No commercial weight ranking is available without active clients.');
        setTextIfExists('en-profit-insight', 'No result contribution ranking is available without active clients.');
        setTextIfExists('en-matrix-insight', 'No client points are available to classify protect, develop, renegotiate, or reactivate actions.');
        setTextIfExists('en-insights-context', `Window: ${context.periodLabel}`);
        setEntityInsightItem('en-insight-1', 'No active clients found for the selected period.');
        setEntityInsightItem('en-insight-2', 'Revenue concentration cannot be calculated without active revenue.');
        setEntityInsightItem('en-insight-3', 'Efficiency and activity flags are unavailable in this window.');

        renderChartEmptyState('chart-entities-sales', 'No client revenue data for this window.');
        renderChartEmptyState('chart-entities-profit', 'No client profit data for this window.');
        renderChartEmptyState('chart-entities-scatter', 'No data points available for the client matrix.');
        renderChartEmptyState('chart-entities-margin-pct', 'No efficiency data for this window.');
        renderChartEmptyState('chart-entities-tx-dist', 'No transaction activity for this window.');

        appState.data.entities.filtered_table_data = [];
        appState.data.entities.reference_date = OVERVIEW_TIME_LIMIT.cutoffDate;
        renderEntitiesTable();
        return;
    }

    let concentrationLabel = 'well diversified';
    if (top5Share >= 0.55) concentrationLabel = 'highly concentrated';
    else if (top5Share >= 0.4) concentrationLabel = 'moderately concentrated';

    const topRevenueName = topRevenueClient ? topRevenueClient.entity_name : 'N/A';
    const topProfitName = topProfitClient ? topProfitClient.entity_name : 'N/A';
    const leadershipRead = topRevenueName === topProfitName
        ? `${topRevenueName} leads both revenue and profit`
        : `${topRevenueName} leads revenue while ${topProfitName} leads profit`;

    let performanceRead = '';
    if (context.comparisonAvailable) {
        const revenueDelta = calculatePercentDelta(totalRevenue, context.previousSummary.sales);
        const profitDelta = calculatePercentDelta(totalProfit, context.previousSummary.profit);
        if (revenueDelta !== null && profitDelta !== null) {
            if (revenueDelta >= 0 && profitDelta >= 0) performanceRead = ` and improving vs ${context.previousLabel}`;
            else if (revenueDelta < 0 && profitDelta < 0) performanceRead = ` and softening vs ${context.previousLabel}`;
            else performanceRead = ` with mixed momentum vs ${context.previousLabel}`;
        }
    }

    const narrativeHeadline = `In ${context.periodLabel}, ${leadershipRead}, and the top 5 clients represent ${formatPercent(top5Share)} of revenue (${concentrationLabel}${performanceRead}).`;
    setTextIfExists('en-dynamic-subheadline', narrativeHeadline);

    const runnerUpRevenueClient = sortedByRevenue[1] || null;
    let commercialWeightInsight = `Top 5 revenue clients represent ${formatPercent(top5Share)} of period revenue.`;
    if (topRevenueClient && runnerUpRevenueClient && (Number(runnerUpRevenueClient.sales) || 0) > 0) {
        const revenueLeadGap = ((Number(topRevenueClient.sales) - Number(runnerUpRevenueClient.sales)) / Number(runnerUpRevenueClient.sales)) * 100;
        commercialWeightInsight += ` ${topRevenueClient.entity_name} is ${Math.abs(revenueLeadGap).toFixed(1)}% above the second client.`;
    }
    setTextIfExists('en-rankings-insight', commercialWeightInsight);

    const top5Profit = sortedByProfit.slice(0, 5);
    const top5ProfitValue = top5Profit.reduce((sum, row) => sum + Math.max(0, Number(row.profit) || 0), 0);
    const positiveProfitPool = filteredData.reduce((sum, row) => sum + Math.max(0, Number(row.profit) || 0), 0);
    let profitContributionInsight = 'No positive profit contribution is available in this period.';
    if (positiveProfitPool > 0 && topProfitClient) {
        const top5ProfitShare = top5ProfitValue / positiveProfitPool;
        profitContributionInsight = `${topProfitClient.entity_name} leads profit, and the top 5 profit clients explain ${formatPercent(top5ProfitShare)} of positive profit contribution.`;
    }
    setTextIfExists('en-profit-insight', profitContributionInsight);

    const avgRevenue = totalRevenue / filteredData.length;
    const avgProfit = totalProfit / filteredData.length;
    const quadrantCounts = filteredData.reduce((acc, row) => {
        const isHighRevenue = (Number(row.sales) || 0) >= avgRevenue;
        const isHighProfit = (Number(row.profit) || 0) >= avgProfit;
        if (isHighRevenue && isHighProfit) acc.hh += 1;
        else if (isHighRevenue && !isHighProfit) acc.hl += 1;
        else if (!isHighRevenue && isHighProfit) acc.lh += 1;
        else acc.ll += 1;
        return acc;
    }, { hh: 0, hl: 0, lh: 0, ll: 0 });

    const matrixInsightText = isMobileView
        ? `Protect ${quadrantCounts.hh} | Develop ${quadrantCounts.lh} | Renegotiate ${quadrantCounts.hl} | Reactivate ${quadrantCounts.ll}.`
        : `${quadrantCounts.hh} protect (high revenue/high profit), ${quadrantCounts.lh} develop (low revenue/high profit), ${quadrantCounts.hl} renegotiate (high revenue/low profit), and ${quadrantCounts.ll} reactivate (low revenue/low profit).`;
    setTextIfExists('en-matrix-insight', matrixInsightText);

    setTextIfExists('en-insights-context', context.comparisonAvailable
        ? `Window: ${context.periodLabel} | Baseline: ${context.previousLabel}`
        : `Window: ${context.periodLabel}`);

    const top3Revenue = sortedByRevenue.slice(0, 3).reduce((sum, row) => sum + (Number(row.sales) || 0), 0);
    const top3Share = totalRevenue > 0 ? top3Revenue / totalRevenue : 0;
    const topEfficientClient = sortedByEfficiencyAll[0] || null;
    const avgProfitPerClient = totalProfit / filteredData.length;
    const avgTxPerClient = totalTx / filteredData.length;
    const highTxLowProfitCount = filteredData.filter(row => (Number(row.tx_count) || 0) >= avgTxPerClient && (Number(row.profit) || 0) < avgProfitPerClient).length;
    const topProfitPositiveShare = positiveProfitPool > 0 && topProfitClient
        ? Math.max(0, Number(topProfitClient.profit) || 0) / positiveProfitPool
        : 0;

    let concentrationInsight = `Top 3 clients account for ${formatPercent(top3Share)} of period revenue.`;
    if (top3Share >= 0.5) concentrationInsight = `Revenue concentration is high: top 3 clients capture ${formatPercent(top3Share)} of period revenue.`;
    else if (top3Share >= 0.35) concentrationInsight = `Revenue concentration is moderate: top 3 clients capture ${formatPercent(top3Share)} of period revenue.`;

    const leadershipInsight = topRevenueName === topProfitName
        ? `${topRevenueName} leads both scale and result in the active period.`
        : (positiveProfitPool > 0
            ? `${topRevenueName} drives scale, while ${topProfitName} contributes ${formatPercent(topProfitPositiveShare)} of positive profit.`
            : `${topRevenueName} leads revenue while ${topProfitName} leads profit in a low-profit window.`);

    const efficiencyRiskInsight = topEfficientClient
        ? `${topEfficientClient.entity_name} is the efficiency benchmark at ${formatPercent(topEfficientClient.avg_profit_pct)}; ${formatNumber(highTxLowProfitCount)} high-activity clients remain below-average profit.`
        : `${formatNumber(highTxLowProfitCount)} high-activity clients remain below-average profit and require margin actions.`;

    setEntityInsightItem('en-insight-1', concentrationInsight);
    setEntityInsightItem('en-insight-2', leadershipInsight);
    setEntityInsightItem('en-insight-3', efficiencyRiskInsight);

    const top10Revenue = sortedByRevenue.slice(0, 10);
    const top10Profit = sortedByProfit.slice(0, 10);
    const top10Efficiency = sortedByEfficiencyAll.slice(0, 10);
    const compactAxisName = (name) => {
        if (!isMobileView) return String(name || '');
        const fullName = String(name || '');
        const maxLen = isSmallMobileView ? 11 : 14;
        return fullName.length > maxLen ? `${fullName.slice(0, maxLen - 3)}...` : fullName;
    };
    const rankingChartHeight = isSmallMobileView ? 300 : (isMobileView ? 320 : 350);
    const secondaryChartHeight = isSmallMobileView ? 250 : (isMobileView ? 275 : 300);

    createChart('chart-entities-sales', {
        series: [{ name: 'Revenue', data: top10Revenue.map(row => Number(row.sales) || 0) }],
        chart: { type: 'bar', height: rankingChartHeight },
        plotOptions: { bar: { horizontal: true, borderRadius: 4 } },
        colors: [appState.colors.primaryMid],
        xaxis: { categories: top10Revenue.map(row => compactAxisName(row.entity_name)), labels: { formatter: val => formatCurrency(val, 0) } },
        tooltip: { y: { formatter: val => formatCurrency(val) } }
    }, 'en_sales');

    createChart('chart-entities-profit', {
        series: [{ name: 'Profit', data: top10Profit.map(row => Number(row.profit) || 0) }],
        chart: { type: 'bar', height: rankingChartHeight },
        plotOptions: { bar: { horizontal: true, borderRadius: 4 } },
        colors: [appState.colors.success],
        xaxis: { categories: top10Profit.map(row => compactAxisName(row.entity_name)), labels: { formatter: val => formatCurrency(val, 0) } },
        tooltip: { y: { formatter: val => formatCurrency(val) } }
    }, 'en_profit');

    const lowestProfitClient = filteredData.slice().sort((a, b) => (Number(a.profit) || 0) - (Number(b.profit) || 0))[0] || null;
    const keyClientCandidates = (isMobileView
        ? [topRevenueClient, topProfitClient, topEfficientClient]
        : [topRevenueClient, topProfitClient, topEfficientClient, lowestProfitClient]
    ).filter(Boolean);
    const seenClients = new Set();
    const keyClients = [];
    keyClientCandidates.forEach(client => {
        if (seenClients.has(client.entity_name)) return;
        seenClients.add(client.entity_name);
        keyClients.push(client);
    });

    const formatKeyClientLabel = (name) => {
        const cleanName = String(name || '');
        const maxLength = isMobileView ? 14 : 18;
        const shortLength = isMobileView ? 11 : 15;
        return cleanName.length > maxLength ? `${cleanName.slice(0, shortLength)}...` : cleanName;
    };

    const maxLabeledKeyClients = isSmallMobileView ? 0 : (isMobileView ? 1 : 3);

    const metricBounds = filteredData.reduce((acc, row) => {
        const revenue = Number(row.sales) || 0;
        const profit = Number(row.profit) || 0;
        if (revenue < acc.revenueMin) acc.revenueMin = revenue;
        if (revenue > acc.revenueMax) acc.revenueMax = revenue;
        if (profit < acc.profitMin) acc.profitMin = profit;
        if (profit > acc.profitMax) acc.profitMax = profit;
        return acc;
    }, {
        revenueMin: 0,
        revenueMax: Number(avgRevenue) || 0,
        profitMin: Number(avgProfit) || 0,
        profitMax: Number(avgProfit) || 0
    });

    const revenueMinRaw = metricBounds.revenueMin;
    const revenueMaxRaw = metricBounds.revenueMax;
    const profitMinRaw = metricBounds.profitMin;
    const profitMaxRaw = metricBounds.profitMax;

    const revenueSpan = Math.max(1, revenueMaxRaw - revenueMinRaw);
    const profitSpan = Math.max(1, profitMaxRaw - profitMinRaw);

    const revenueMinAxis = revenueMinRaw - (revenueSpan * 0.05);
    const revenueMaxAxis = revenueMaxRaw + (revenueSpan * 0.08);
    const profitMinAxis = profitMinRaw - (profitSpan * 0.08);
    const profitMaxAxis = profitMaxRaw + (profitSpan * 0.08);

    const leftBandEnd = avgRevenue;
    const rightBandStart = avgRevenue;
    const bottomBandEnd = avgProfit;
    const topBandStart = avgProfit;

    const quadrantShadeOpacity = isMobileView ? 0.06 : 0.05;
    const avgRevenueRatio = (avgRevenue - revenueMinAxis) / Math.max(1, revenueMaxAxis - revenueMinAxis);
    const avgProfitRatio = (avgProfit - profitMinAxis) / Math.max(1, profitMaxAxis - profitMinAxis);
    const avgRevenueBadgeOffsetX = avgRevenueRatio > 0.72 ? -18 : (avgRevenueRatio < 0.28 ? 18 : 0);
    const keyClientsRightSideCount = keyClients.filter(client => (Number(client.sales) || 0) >= avgRevenue).length;
    const avgProfitLabelPosition = (isMobileView || keyClientsRightSideCount >= 2) ? 'left' : 'right';
    const avgProfitBadgeXRatio = avgProfitLabelPosition === 'left' ? 0.12 : 0.88;
    const avgRevenueBadgeXRatio = Math.min(0.92, Math.max(0.08, avgRevenueRatio + (avgRevenueBadgeOffsetX / (isMobileView ? 210 : 300))));

    const normalizeRatio = (value, min, max) => (value - min) / Math.max(1, max - min);
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const approxChartWidth = isMobileView ? 210 : 300;
    const approxChartHeight = isMobileView ? 170 : 235;

    const placementConflicts = (a, b) => {
        const minDeltaX = isMobileView ? 0.13 : 0.10;
        const minDeltaY = isMobileView ? 0.11 : 0.085;
        return Math.abs(a.anchorX - b.anchorX) < minDeltaX && Math.abs(a.anchorY - b.anchorY) < minDeltaY;
    };

    const buildLabelPlacement = (row, existingPlacements = []) => {
        const xValue = Number(row.sales) || 0;
        const yValue = Number(row.profit) || 0;
        const xRatio = normalizeRatio(xValue, revenueMinAxis, revenueMaxAxis);
        const yRatio = normalizeRatio(yValue, profitMinAxis, profitMaxAxis);

        let offsetX = xRatio > 0.78 ? -16 : 12;
        let offsetY = yRatio > 0.82 ? 14 : -12;

        if (xRatio < 0.20) offsetX = 12;
        if (yRatio < 0.16) offsetY = -10;

        if (Math.abs(xRatio - avgRevenueRatio) < 0.08) {
            offsetX += xRatio >= avgRevenueRatio ? 10 : -10;
        }
        if (Math.abs(yRatio - avgProfitRatio) < 0.08) {
            offsetY += yRatio >= avgProfitRatio ? 10 : -10;
        }

        let anchorX = xRatio + (offsetX / approxChartWidth);
        let anchorY = yRatio - (offsetY / approxChartHeight);

        const hitsRevenueBadge = Math.abs(anchorX - avgRevenueBadgeXRatio) < 0.13 && anchorY > 0.76;
        if (hitsRevenueBadge) {
            offsetY += 14;
            anchorY = yRatio - (offsetY / approxChartHeight);
        }

        const hitsProfitBadge = Math.abs(anchorY - avgProfitRatio) < 0.09 && Math.abs(anchorX - avgProfitBadgeXRatio) < 0.15;
        if (hitsProfitBadge) {
            offsetX += avgProfitLabelPosition === 'right' ? -18 : 18;
            anchorX = xRatio + (offsetX / approxChartWidth);
        }

        anchorX = clamp(anchorX, 0.06, 0.94);
        anchorY = clamp(anchorY, 0.10, 0.92);

        const resolvedOffsetX = Math.round((anchorX - xRatio) * approxChartWidth);
        const resolvedOffsetY = Math.round((yRatio - anchorY) * approxChartHeight);

        let placement = {
            offsetX: resolvedOffsetX,
            offsetY: resolvedOffsetY,
            anchorX,
            anchorY
        };

        let conflict = existingPlacements.some(existing => placementConflicts(placement, existing));

        if (conflict) {
            const mirroredOffsetX = -placement.offsetX;
            const mirroredOffsetY = placement.offsetY >= 0
                ? -Math.max(10, Math.abs(placement.offsetY))
                : Math.max(10, Math.abs(placement.offsetY));

            const mirroredAnchorX = clamp(xRatio + (mirroredOffsetX / approxChartWidth), 0.06, 0.94);
            const mirroredAnchorY = clamp(yRatio - (mirroredOffsetY / approxChartHeight), 0.10, 0.92);
            const mirroredPlacement = {
                offsetX: Math.round((mirroredAnchorX - xRatio) * approxChartWidth),
                offsetY: Math.round((yRatio - mirroredAnchorY) * approxChartHeight),
                anchorX: mirroredAnchorX,
                anchorY: mirroredAnchorY
            };

            const mirroredConflict = existingPlacements.some(existing => placementConflicts(mirroredPlacement, existing));
            if (!mirroredConflict) {
                placement = mirroredPlacement;
                conflict = false;
            }
        }

        return { ...placement, conflict };
    };

    const acceptedLabelPlacements = [];
    const keyLabelAnnotations = [];

    keyClients.forEach((client, index) => {
        if (index >= maxLabeledKeyClients) return;

        const placement = buildLabelPlacement(client, acceptedLabelPlacements);
        if (placement.conflict && index >= 1) return;

        acceptedLabelPlacements.push(placement);

        keyLabelAnnotations.push({
            x: Number(client.sales) || 0,
            y: Number(client.profit) || 0,
            marker: { size: 0 },
            label: {
                text: formatKeyClientLabel(client.entity_name),
                offsetX: placement.offsetX,
                offsetY: placement.offsetY,
                borderColor: 'rgba(15, 33, 69, 0.24)',
                style: {
                    background: 'rgba(255, 255, 255, 0.94)',
                    color: '#0f2145',
                    fontSize: isMobileView ? '9px' : '10px',
                    fontWeight: 500
                }
            }
        });
    });

    const keyClientMarkers = keyClients.map((_row, index) => ({
        seriesIndex: 1,
        dataPointIndex: index,
        fillColor: appState.colors.warning,
        strokeColor: '#FFFFFF',
        size: isMobileView ? 11.5 : 10.5,
        shape: 'circle',
        strokeWidth: isMobileView ? 2.2 : 2.0
    }));

    createChart('chart-entities-scatter', {
        series: [
            { name: 'Clients', data: filteredData.map(row => ({ name: row.entity_name, x: Number(row.sales) || 0, y: Number(row.profit) || 0 })) },
            { name: 'Key Clients', data: keyClients.map(row => ({ name: row.entity_name, x: Number(row.sales) || 0, y: Number(row.profit) || 0 })) }
        ],
        chart: { type: 'scatter', height: isSmallMobileView ? 330 : (isMobileView ? 360 : 410), zoom: { enabled: true, type: 'xy' } },
        subtitle: {
            text: isSmallMobileView
                ? 'Zones: Protect | Develop | Renegotiate | Reactivate'
                : (isMobileView
                ? 'Quadrants: Protect / Develop / Renegotiate / Reactivate'
                : 'Decision zones: Protect | Develop | Renegotiate | Reactivate'),
            align: 'left',
            offsetY: isMobileView ? 4 : 6,
            style: { fontSize: isSmallMobileView ? '9px' : (isMobileView ? '10px' : '11px'), fontWeight: 500, color: '#5d6f87' }
        },
        colors: [appState.colors.primaryMid, appState.colors.warning],
        markers: {
            size: [isMobileView ? 6 : 5.5, isMobileView ? 9 : 8],
            strokeColors: '#FFFFFF',
            strokeWidth: isMobileView ? 1.6 : 1.3,
            opacity: 0.96,
            hover: { sizeOffset: isMobileView ? 1.5 : 2.5 },
            discrete: keyClientMarkers
        },
        dataLabels: { enabled: false },
        legend: {
            show: !isSmallMobileView,
            position: isMobileView ? 'bottom' : 'top',
            horizontalAlign: 'left',
            fontSize: isMobileView ? '10px' : '11px',
            markers: { width: isMobileView ? 8 : 9, height: isMobileView ? 8 : 9, strokeWidth: 0 },
            itemMargin: { horizontal: 10, vertical: 2 }
        },
        grid: {
            borderColor: isMobileView ? 'rgba(2, 22, 64, 0.18)' : 'rgba(2, 22, 64, 0.14)',
            strokeDashArray: isMobileView ? 2 : 4,
            xaxis: { lines: { show: true } },
            yaxis: { lines: { show: true } },
            padding: { top: isMobileView ? 6 : 10, right: isMobileView ? 8 : 12, left: isMobileView ? 4 : 8, bottom: 0 }
        },
        xaxis: {
            type: 'numeric',
            min: revenueMinAxis,
            max: revenueMaxAxis,
            title: { text: 'Revenue' },
            labels: {
                formatter: val => isMobileView ? formatCurrencyCompact(val, 1) : formatCurrency(val, 0),
                style: { fontSize: isMobileView ? '10px' : '11px' }
            },
            tickAmount: isSmallMobileView ? 3 : (isMobileView ? 4 : 6)
        },
        yaxis: {
            type: 'numeric',
            min: profitMinAxis,
            max: profitMaxAxis,
            title: { text: 'Profit' },
            labels: {
                formatter: val => isMobileView ? formatCurrencyCompact(val, 1) : formatCurrency(val, 0),
                style: { fontSize: isMobileView ? '10px' : '11px' }
            }
        },
        annotations: {
            xaxis: [
                {
                    x: revenueMinAxis,
                    x2: leftBandEnd,
                    borderColor: 'transparent',
                    fillColor: '#eaf2ff',
                    opacity: quadrantShadeOpacity
                },
                {
                    x: rightBandStart,
                    x2: revenueMaxAxis,
                    borderColor: 'transparent',
                    fillColor: '#eef8ff',
                    opacity: quadrantShadeOpacity
                },
                {
                    x: avgRevenue,
                    borderColor: '#0b4d98',
                    borderWidth: isMobileView ? 2.1 : 1.9,
                    strokeDashArray: 0,
                    label: {
                        text: isMobileView ? 'Avg Rev' : 'Avg Revenue',
                        offsetX: avgRevenueBadgeOffsetX,
                        offsetY: isMobileView ? 5 : 3,
                        style: {
                            color: '#FFFFFF',
                            background: 'rgba(11, 77, 152, 0.82)',
                            fontSize: isMobileView ? '9px' : '10px',
                            fontWeight: 600,
                            padding: isMobileView
                                ? { left: 5, right: 5, top: 2, bottom: 2 }
                                : { left: 6, right: 6, top: 2, bottom: 2 }
                        }
                    }
                }
            ],
            yaxis: [
                {
                    y: profitMinAxis,
                    y2: bottomBandEnd,
                    borderColor: 'transparent',
                    fillColor: '#fff3ea',
                    opacity: quadrantShadeOpacity
                },
                {
                    y: topBandStart,
                    y2: profitMaxAxis,
                    borderColor: 'transparent',
                    fillColor: '#ecfaf1',
                    opacity: quadrantShadeOpacity
                },
                {
                    y: avgProfit,
                    borderColor: '#118553',
                    borderWidth: isMobileView ? 2.1 : 2,
                    strokeDashArray: 0,
                    label: {
                        text: isMobileView ? 'Avg Prof' : 'Avg Profit',
                        position: avgProfitLabelPosition,
                        offsetX: avgProfitLabelPosition === 'left' ? 4 : 6,
                        offsetY: avgProfitRatio > 0.8 ? 8 : (avgProfitRatio < 0.2 ? -8 : 0),
                        style: {
                            color: '#FFFFFF',
                            background: 'rgba(17, 133, 83, 0.82)',
                            fontSize: isMobileView ? '9px' : '10px',
                            fontWeight: 600,
                            padding: isMobileView
                                ? { left: 5, right: 5, top: 2, bottom: 2 }
                                : { left: 6, right: 6, top: 2, bottom: 2 }
                        }
                    }
                }
            ],
            points: keyLabelAnnotations
        },
        tooltip: {
            custom: ({ seriesIndex, dataPointIndex, w }) => {
                const point = w.globals.initialSeries[seriesIndex].data[dataPointIndex];
                return `<div style="padding: 10px; font-family: Inter, sans-serif;">
                    <strong style="color:var(--primary-dark);">${point.name}</strong><br/>
                    <span style="font-size:0.85rem; color:var(--text-muted);">Revenue:</span> ${formatCurrency(point.x)}<br/>
                    <span style="font-size:0.85rem; color:var(--text-muted);">Profit:</span> <span style="color:var(--success); font-weight:600;">${formatCurrency(point.y)}</span>
                </div>`;
            }
        }
    }, 'en_scatter');

    createChart('chart-entities-margin-pct', {
        series: [{ name: 'Efficiency (Profit %)', data: top10Efficiency.map(row => (Number(row.avg_profit_pct) || 0) * 100) }],
        chart: { type: 'bar', height: secondaryChartHeight },
        plotOptions: { bar: { horizontal: true, borderRadius: 4 } },
        colors: [appState.colors.primaryLight],
        xaxis: { categories: top10Efficiency.map(row => compactAxisName(row.entity_name)), labels: { formatter: val => val.toFixed(0) + '%' } },
        dataLabels: { enabled: true, formatter: val => val.toFixed(2) + '%', style: { fontSize: '10px' } },
        tooltip: { y: { formatter: val => val.toFixed(2) + '%' } }
    }, 'en_margin_pct');

    const topTx = filteredData
        .slice()
        .sort((a, b) => (Number(b.tx_count) || 0) - (Number(a.tx_count) || 0))
        .slice(0, isSmallMobileView ? 6 : (isMobileView ? 8 : 10));
    createChart('chart-entities-tx-dist', {
        series: [{ name: 'Commercial Activity (Tx)', data: topTx.map(row => Number(row.tx_count) || 0) }],
        chart: { type: 'bar', height: secondaryChartHeight },
        plotOptions: { bar: { horizontal: false, columnWidth: '50%', borderRadius: 4 } },
        colors: [appState.colors.primaryDark],
        xaxis: { categories: topTx.map(row => compactAxisName(row.entity_name)), labels: { rotate: isMobileView ? -38 : -45, style: { fontSize: isMobileView ? '9px' : '10px' } } },
        yaxis: { labels: { formatter: val => formatNumber(val) } }
    }, 'en_tx');

    const referenceDate = context.latestMonthDate
        ? new Date(context.latestMonthDate.getFullYear(), context.latestMonthDate.getMonth() + 1, 0)
        : OVERVIEW_TIME_LIMIT.cutoffDate;

    appState.data.entities.filtered_table_data = filteredData;
    appState.data.entities.reference_date = referenceDate;
    renderEntitiesTable();
};

const renderEntitiesTable = () => {
    if (!appState.data.entities) return;
    const searchInput = document.getElementById('en-search-input');
    const sortSelect = document.getElementById('en-sort-select');
    const tbody = document.getElementById('table-entities-body');
    const emptyState = document.getElementById('en-empty-state');
    const mobileCards = document.getElementById('en-mobile-cards');
    if (!tbody) return;

    const tableWrapper = tbody.closest('.table-responsive');
    const isMobileView = window.innerWidth <= 768;

    const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
    const sortVal = sortSelect ? sortSelect.value : 'sales_desc';
    let filtered = (appState.data.entities.filtered_table_data || appState.data.entities.table_data || []).map(row => ({ ...row }));

    filtered = filtered.filter(row => {
        const name = row.entity_name ? String(row.entity_name).toLowerCase() : '';
        return name.includes(searchTerm);
    });

    filtered.sort((a, b) => {
        switch (sortVal) {
            case 'sales_desc': return (Number(b.sales) || 0) - (Number(a.sales) || 0);
            case 'profit_desc': return (Number(b.profit) || 0) - (Number(a.profit) || 0);
            case 'margin_pct_desc': return (Number(b.avg_margin_pct) || 0) - (Number(a.avg_margin_pct) || 0);
            case 'tx_desc': return (Number(b.tx_count) || 0) - (Number(a.tx_count) || 0);
            case 'name_asc': return String(a.entity_name || '').localeCompare(String(b.entity_name || ''));
            default: return (Number(b.sales) || 0) - (Number(a.sales) || 0);
        }
    });

    const referenceDate = appState.data.entities.reference_date || OVERVIEW_TIME_LIMIT.cutoffDate;
    const avgProfitPct = filtered.length
        ? filtered.reduce((sum, row) => sum + (Number(row.avg_profit_pct) || 0), 0) / filtered.length
        : 0;

    tbody.innerHTML = '';
    if (mobileCards) mobileCards.innerHTML = '';

    if (filtered.length === 0) {
        if (emptyState) emptyState.style.display = 'block';
        if (tableWrapper) tableWrapper.style.display = 'none';
        if (mobileCards) mobileCards.style.display = 'none';
        return;
    }

    if (emptyState) emptyState.style.display = 'none';
    if (tableWrapper) tableWrapper.style.display = isMobileView ? 'none' : 'block';
    if (mobileCards) mobileCards.style.display = isMobileView ? 'grid' : 'none';

    filtered.forEach((row, index) => {
        const statusMeta = getClientStatusMeta(row, referenceDate);
        const profitColor = (Number(row.profit) || 0) >= 0 ? 'var(--success)' : 'var(--danger)';
        const marginTone = (Number(row.avg_profit_pct) || 0) >= avgProfitPct ? 'var(--success)' : 'var(--text-muted)';

        if (!isMobileView) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${row.entity_name}</strong></td>
                <td class="text-right">${formatCurrency(row.sales)}</td>
                <td class="text-right">${formatCurrency(row.cost)}</td>
                <td class="text-right">${formatCurrency(row.expenses)}</td>
                <td class="text-right">${formatCurrency(row.margin)}</td>
                <td class="text-right" style="color:${profitColor}; font-weight:500;">${formatCurrency(row.profit)}</td>
                <td class="text-center">${formatNumber(row.tx_count)}</td>
                <td class="text-center">${formatPercent(row.avg_margin_pct)}</td>
                <td class="text-center" style="font-weight:500; color:${marginTone};">${formatPercent(row.avg_profit_pct)}</td>
                <td class="text-center"><span class="badge badge-${statusMeta.badge}">${statusMeta.label}</span></td>
                <td class="text-center" style="font-size:0.8rem; color:${statusMeta.color};">${formatDate(row.last_sale_date)}</td>
            `;
            tbody.appendChild(tr);
        }

        if (isMobileView && mobileCards) {
            const card = document.createElement('article');
            card.className = 'en-client-card';
            card.innerHTML = `
                <div class="en-client-card-top">
                    <div class="en-client-card-title">
                        <span class="en-client-rank">#${index + 1}</span>
                        <span class="en-client-name" title="${row.entity_name}">${row.entity_name}</span>
                    </div>
                    <span class="badge badge-${statusMeta.badge}">${statusMeta.label}</span>
                </div>
                <div class="en-client-metrics">
                    <div class="en-client-metric"><span class="en-client-metric-label">Revenue</span><span class="en-client-metric-value">${formatCurrency(row.sales)}</span></div>
                    <div class="en-client-metric"><span class="en-client-metric-label">Profit</span><span class="en-client-metric-value" style="color:${profitColor};">${formatCurrency(row.profit)}</span></div>
                    <div class="en-client-metric"><span class="en-client-metric-label">Margin</span><span class="en-client-metric-value">${formatCurrency(row.margin)}</span></div>
                    <div class="en-client-metric"><span class="en-client-metric-label">Tx Count</span><span class="en-client-metric-value">${formatNumber(row.tx_count)}</span></div>
                    <div class="en-client-metric"><span class="en-client-metric-label">Margin %</span><span class="en-client-metric-value">${formatPercent(row.avg_margin_pct)}</span></div>
                    <div class="en-client-metric"><span class="en-client-metric-label">Profit %</span><span class="en-client-metric-value" style="color:${marginTone};">${formatPercent(row.avg_profit_pct)}</span></div>
                </div>
                <div class="en-client-card-foot">
                    <span>Cost ${formatCurrency(row.cost)}</span>
                    <span>Expenses ${formatCurrency(row.expenses)}</span>
                    <span>Last ${formatDate(row.last_sale_date)}</span>
                </div>
            `;
            mobileCards.appendChild(card);
        }
    });
};

// ============================================================================
// RENDER: PRODUCTS & LOCATIONS
// ============================================================================
const renderProductsLocations = (data) => {
    if (!document.querySelector("#chart-product-sales")) return;
    destroyChartsByPrefix('pl_');

    const prod = data.products;
    const loc = data.locations;

    document.getElementById('pl-top-product-sales').innerText = prod.top_product_by_sales;
    document.getElementById('pl-top-product-profit').innerText = prod.top_product_by_profit;
    document.getElementById('pl-top-category').innerText = prod.top_category_by_sales;

    const topProdSales = prod.list.slice(0, 10);
    const topProdProfit = [...prod.list].sort((a,b) => b.profit - a.profit).slice(0, 10);

    createChart('chart-product-sales', {
        series: [{ name: 'Sales', data: topProdSales.map(d => d.sales) }],
        chart: { type: 'bar', height: 250 },
        plotOptions: { bar: { horizontal: false, borderRadius: 3 } }, // Changed to vertical
        colors: [appState.colors.primaryMid],
        xaxis: { categories: topProdSales.map(d => d.product), labels: { rotate: -45, style: { fontSize: '10px' } } }, // Slanted labels
        yaxis: { labels: { formatter: (val) => formatCurrency(val, 0) } }, // No decimals
        tooltip: { y: { formatter: (val) => formatCurrency(val) } }
    }, 'pl_prod_sales');

    createChart('chart-product-profit', {
        series: [{ name: 'Profit', data: topProdProfit.map(d => d.profit) }],
        chart: { type: 'bar', height: 250 },
        plotOptions: { bar: { horizontal: false, borderRadius: 3 } }, // Changed to vertical
        colors: [appState.colors.success],
        xaxis: { categories: topProdProfit.map(d => d.product), labels: { rotate: -45, style: { fontSize: '10px' } } }, // Slanted labels
        yaxis: { labels: { formatter: (val) => formatCurrency(val, 0) } }, // No decimals
        tooltip: { y: { formatter: (val) => formatCurrency(val) } }
    }, 'pl_prod_profit');

    createChart('chart-product-category', {
        series: prod.category_distribution.map(d => d.sales),
        labels: prod.category_distribution.map(d => d.category),
        chart: { type: 'donut', height: 250 },
        tooltip: { y: { formatter: (val) => formatCurrency(val) } },
        legend: { position: 'bottom' }
    }, 'pl_prod_cat');

    createChart('chart-product-margins', {
        series: [
            { name: 'Margin %', data: topProdSales.map(d => d.avg_margin_pct * 100) },
            { name: 'Profit %', data: topProdSales.map(d => d.avg_profit_pct * 100) }
        ],
        chart: { type: 'bar', height: 300 },
        plotOptions: { bar: { horizontal: false, columnWidth: '55%', borderRadius: 2, dataLabels: { position: 'top' } } },
        colors: [appState.colors.primaryLight, appState.colors.success],
        xaxis: { categories: topProdSales.map(d => d.product), labels: { rotate: -45, style: { fontSize: '10px' } } },
        yaxis: { labels: { formatter: (val) => val.toFixed(0) + '%' } },
        dataLabels: { enabled: true, formatter: (val) => val.toFixed(2) + '%', style: { fontSize: '9px', colors: ["#304758"] }, offsetY: -20 }, // 2 decimals
        tooltip: { y: { formatter: (val) => val.toFixed(2) + '%' } }
    }, 'pl_prod_margins');

    const tbodyProd = document.getElementById('table-products-body');
    if(tbodyProd) {
        tbodyProd.innerHTML = '';
        prod.list.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${row.product}</strong></td>
                <td><span class="badge badge-primary">${row.category}</span></td>
                <td class="text-right">${formatCurrency(row.sales)}</td>
                <td class="text-right">${formatCurrency(row.cost)}</td>
                <td class="text-right">${formatCurrency(row.margin)}</td>
                <td class="text-right" style="color:var(--success); font-weight:500;">${formatCurrency(row.profit)}</td>
                <td class="text-center">${formatPercent(row.avg_margin_pct)}</td>
                <td class="text-center" style="font-weight:500;">${formatPercent(row.avg_profit_pct)}</td>
            `;
            tbodyProd.appendChild(tr);
        });
    }

    document.getElementById('pl-top-location-sales').innerText = loc.top_location_by_sales;
    document.getElementById('pl-top-location-target').innerText = loc.top_location_by_target_attainment;
    const gapEl = document.getElementById('pl-target-gap');
    if(gapEl) {
        gapEl.innerText = formatCurrency(loc.total_target_gap);
        if (loc.total_target_gap <= 0) {
            gapEl.style.color = 'var(--success)';
            gapEl.innerText = '+' + formatCurrency(Math.abs(loc.total_target_gap)) + ' (Over Target)';
        }
    }

    createChart('chart-location-sales-target', {
        series: [
            { name: 'Actual Sales', data: loc.list.map(d => d.sales) },
            { name: 'Target Sales', data: loc.list.map(d => d.target_sales) }
        ],
        chart: { type: 'bar', height: 250 },
        plotOptions: { bar: { horizontal: false, columnWidth: '60%', borderRadius: 2, dataLabels: { position: 'top' } } },
        colors: [appState.colors.primaryMid, appState.colors.warning],
        xaxis: { categories: loc.list.map(d => d.location), labels: { rotate: -45, style: { fontSize: '10px' } } },
        yaxis: { labels: { formatter: (val) => formatCurrency(val, 0) } },
        dataLabels: { enabled: true, formatter: (val) => formatCurrency(val, 0), style: { fontSize: '9px', colors: ["#304758"] }, offsetY: -20 }, // No decimals
        tooltip: { y: { formatter: (val) => formatCurrency(val) } }
    }, 'pl_loc_vs');

    createChart('chart-location-profit', {
        series: loc.list.map(d => Math.max(0, d.profit)),
        labels: loc.list.map(d => d.location),
        chart: { type: 'donut', height: 250 },
        tooltip: { y: { formatter: (val) => formatCurrency(val) } },
        legend: { position: 'bottom' }
    }, 'pl_loc_profit');

    const sortedLoc = [...loc.list].sort((a,b) => b.target_attainment - a.target_attainment);
    createChart('chart-location-attainment', {
        series: [{ name: 'Attainment %', data: sortedLoc.map(d => d.target_attainment * 100) }],
        chart: { type: 'bar', height: 350 }, // Increased height for full width
        plotOptions: { bar: { horizontal: true, borderRadius: 4 } },
        colors: [function({ value }) {
            if (value >= 100) return appState.colors.success;
            if (value >= 80) return appState.colors.warning;
            return appState.colors.danger;
        }],
        xaxis: { categories: sortedLoc.map(d => d.location), labels: { formatter: (val) => val.toFixed(0) + '%' } },
        tooltip: { y: { formatter: (val) => val.toFixed(1) + '%' } },
        annotations: { xaxis: [{ x: 100, borderColor: appState.colors.success, label: { text: 'Target (100%)', style: { color: '#fff', background: appState.colors.success } } }] }
    }, 'pl_loc_attain');

    const tbodyLoc = document.getElementById('table-locations-body');
    if(tbodyLoc) {
        tbodyLoc.innerHTML = '';
        loc.list.forEach(row => {
            const variance = row.sales - row.target_sales;
            const varianceColor = variance >= 0 ? 'var(--success)' : 'var(--danger)';
            const attainmentColor = row.target_attainment >= 1 ? 'var(--success)' : (row.target_attainment >= 0.8 ? 'var(--warning)' : 'var(--danger)');
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${row.location}</strong></td>
                <td class="text-right" style="font-weight:600;">${formatCurrency(row.sales)}</td>
                <td class="text-right" style="color:var(--text-muted);">${formatCurrency(row.target_sales)}</td>
                <td class="text-center" style="color:${attainmentColor}; font-weight:600;">${formatPercent(row.target_attainment)}</td>
                <td class="text-right" style="color:${varianceColor};">${variance > 0 ? '+' : ''}${formatCurrency(variance)}</td>
                <td class="text-right">${formatCurrency(row.cost)}</td>
                <td class="text-right">${formatCurrency(row.expenses)}</td>
                <td class="text-right">${formatCurrency(row.margin)}</td>
                <td class="text-right" style="color:var(--success); font-weight:500;">${formatCurrency(row.profit)}</td>
            `;
            tbodyLoc.appendChild(tr);
        });
    }
};
</script>
