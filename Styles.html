<style>
:root {
    --primary-dark: #021640; --primary-mid: #0066CC; --primary-light: #0099CC;
    --accent-1: #4572C4; --accent-2: #558ED5; --bg-color: #f4f6f9;
    --card-bg: #ffffff; --text-main: #021640; --text-muted: #6c757d;
    --border-color: #e2e8f0; --success: #1fa971; --warning: #f39c12; --danger: #e74c3c;
    --shadow: 0 2px 10px rgba(0,0,0,0.08); --shadow-hover: 0 5px 15px rgba(0,0,0,0.12);
    --radius: 10px; --radius-sm: 6px; --sidebar-width: 260px; --header-height: 70px;
    --font-sans: 'Inter', sans-serif; --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
a { text-decoration: none; color: var(--primary-mid); }
ul { list-style: none; }

.app-layout { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-width); background-color: var(--primary-dark); color: #fff; position: fixed; height: 100vh; left: 0; top: 0; z-index: 100; transition: transform 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
.sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 95; }
.sidebar-overlay.active { display: block; }

.main-wrapper { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; min-height: 100vh; transition: margin-left 0.3s ease; }
.sidebar-brand { height: var(--header-height); display: flex; align-items: center; padding: 0 18px; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 14px; }
.brand-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(155deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.05) 100%);
    box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.2), 0 6px 12px rgba(0, 0, 0, 0.22);
    flex-shrink: 0;
}
.brand-logo { width: 34px; height: 34px; display: block; filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.18)); }
.brand-text { display: grid; gap: 2px; min-width: 0; }
.brand-text h2 { font-family: var(--font-display); font-size: 1.06rem; font-weight: 700; letter-spacing: 0.35px; word-spacing: 0.7px; margin: 0; line-height: 1.02; white-space: nowrap; }
.brand-text span { font-family: var(--font-sans); font-size: 0.64rem; color: rgba(186, 230, 253, 0.95); text-transform: uppercase; letter-spacing: 1.15px; word-spacing: 1px; font-weight: 650; line-height: 1.1; white-space: nowrap; }
.sidebar-nav { padding: 20px 0; }
.nav-item { padding: 15px 25px; display: flex; align-items: center; cursor: pointer; transition: all 0.2s ease; border-left: 4px solid transparent; color: rgba(255,255,255,0.7); }
.nav-item i { width: 25px; font-size: 1.1rem; margin-right: 10px; }
.nav-item span { font-family: var(--font-display); font-size: 0.92rem; font-weight: 600; letter-spacing: 0.15px; }
.nav-item:hover { background-color: rgba(255,255,255,0.05); color: #fff; }
.nav-item.active { background-color: rgba(255,255,255,0.1); border-left-color: var(--primary-light); color: #fff; }

.top-header { min-height: var(--header-height); background-color: var(--card-bg); display: flex; justify-content: space-between; align-items: center; padding: 12px 30px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 90; gap: 12px; flex-wrap: wrap; }
.header-left { display: flex; align-items: center; gap: 15px; min-width: 0; }
.header-left > div { min-width: 0; }
.header-left .dashboard-title { font-family: var(--font-display); font-size: 1.16rem; font-weight: 700; letter-spacing: -0.01em; color: var(--primary-dark); margin: 0; line-height: 1.2; }
.header-left .dashboard-subtitle { font-family: var(--font-sans); font-size: 0.8rem; color: var(--text-muted); margin: 0; }
.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; margin-left: auto; }
.update-info { font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; align-items: flex-end; }
.last-updated-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
#last-updated-time { font-weight: 600; color: var(--primary-dark); }
.user-profile .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--primary-mid); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,102,204,0.3); }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; border: none; outline: none; gap: 8px; }
.btn-primary { background-color: var(--primary-mid); color: #fff; }
.btn-primary:hover { background-color: var(--primary-dark); }
.btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
.btn-outline:hover { background-color: var(--bg-color); border-color: var(--primary-mid); color: var(--primary-mid); }

.views-container { flex: 1; padding: 30px; position: relative; }
.view-section { display: none; animation: fadeIn 0.4s ease; }
.view-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Compact modifiers */
.kpi-grid-compact { gap: 15px; }
.kpi-grid-compact .kpi-card { padding: 15px; min-height: 100px; }
.kpi-grid-compact .kpi-icon { width: 42px; height: 42px; font-size: 1.25rem; margin-right: 12px; }
.kpi-grid-compact .kpi-value { font-size: 1.35rem; }
.kpi-grid-compact .kpi-title { font-size: 0.75rem; }

.kpi-card-mini { padding: 10px 15px; }
.kpi-card-mini .kpi-icon { width: 34px; height: 34px; font-size: 1rem; margin-right: 10px; }
.kpi-card-mini .kpi-value { font-size: 1.1rem; }
.kpi-card-mini .kpi-title { font-size: 0.7rem; margin-bottom: 2px; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
.kpi-card { background-color: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; align-items: flex-start; transition: transform 0.2s ease, box-shadow 0.2s ease; border: 1px solid var(--border-color); }
.kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.kpi-icon { width: 50px; height: 50px; border-radius: var(--radius-sm); background-color: rgba(0, 102, 204, 0.1); color: var(--primary-mid); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 15px; flex-shrink: 0; }
.kpi-icon.success { background-color: rgba(31, 169, 113, 0.1); color: var(--success); }
.kpi-icon.warning { background-color: rgba(243, 156, 18, 0.1); color: var(--warning); }
.kpi-icon.danger { background-color: rgba(231, 76, 60, 0.1); color: var(--danger); }
.kpi-content { flex: 1; min-width: 0; }
.kpi-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: 600; }
.kpi-value { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kpi-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 5px; }

.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
.charts-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.charts-grid.cols-1 { grid-template-columns: 1fr; }
.chart-card { background-color: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: flex; flex-direction: column; }
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
.chart-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 650; color: var(--primary-dark); margin: 0; }
.chart-header p { font-family: var(--font-sans); line-height: 1.45; }
.chart-container { flex: 1; min-height: 300px; position: relative; }

.table-responsive { width: 100%; overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
.data-table { width: 100%; border-collapse: collapse; background-color: var(--card-bg); font-size: 0.9rem; }
.data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
.data-table th { background-color: #f8fafc; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 10; }
.data-table tbody tr:hover { background-color: #f8fafc; }
.data-table tbody tr:last-child td { border-bottom: none; }
.text-right { text-align: right !important; }
.text-center { text-align: center !important; }

.badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
.badge-success { background-color: rgba(31, 169, 113, 0.1); color: var(--success); }
.badge-warning { background-color: rgba(243, 156, 18, 0.1); color: var(--warning); }
.badge-danger { background-color: rgba(231, 76, 60, 0.1); color: var(--danger); }
.badge-primary { background-color: rgba(0, 102, 204, 0.1); color: var(--primary-mid); }

.loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(0, 102, 204, 0.2); border-top-color: var(--primary-mid); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text { color: var(--primary-dark); font-weight: 500; font-size: 1.1rem; }

.error-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 9998; display: flex; align-items: center; justify-content: center; }
.error-container.hidden { display: none; }
.error-content { background-color: var(--card-bg); padding: 30px; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 90%; }
.error-content i { font-size: 3rem; color: var(--danger); margin-bottom: 15px; }
.error-content h3 { color: var(--primary-dark); margin-bottom: 10px; }
.error-content p { color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem; }

.app-footer { padding: 20px 30px; text-align: center; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border-color); background-color: var(--card-bg); margin-top: auto; }

/* Filter Styles */
.global-filter { display: flex; align-items: center; max-width: 100%; }
.global-filter-row { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.global-filter-row-multi { flex-wrap: wrap; row-gap: 6px; }
.global-filter-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.4px; font-weight: 600; }
.exec-filter { padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-family: var(--font-sans); font-size: 0.85rem; outline: none; cursor: pointer; color: var(--primary-dark); font-weight: 500; background-color: var(--bg-color); min-width: 165px; }
.global-filter-warning { width: 100%; margin-top: 4px; font-size: 0.72rem; color: var(--warning); font-weight: 600; text-align: right; }

.view-header h2,
.overview-main-headline {
    font-family: var(--font-display);
    letter-spacing: -0.01em;
}

.view-header p,
.overview-subheadline,
.overview-insight-context,
#pl-month-filter-context {
    font-family: var(--font-sans);
    line-height: 1.45;
}

/* Overview */
.overview-header { margin-bottom: 20px; display: grid; gap: 12px; }
.overview-main-headline { color: var(--primary-dark); font-weight: 600; font-size: 1.35rem; margin-bottom: 6px; line-height: 1.3; letter-spacing: -0.01em; }
.overview-subheadline { color: var(--text-muted); font-size: 0.92rem; margin: 0; }
.overview-time-context { background-color: #f8fbff; border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 10px 12px; }
.overview-time-note { font-size: 0.84rem; line-height: 1.4; color: var(--primary-dark); margin: 0; }
.overview-time-note.muted { color: var(--text-muted); margin-top: 4px; }
.overview-section-title { font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
.overview-kpi-grid { margin-bottom: 25px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.overview-drivers-mix-grid { grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; }
.overview-driver-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.overview-insights-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
.overview-insight-context { color: var(--text-muted); font-size: 0.8rem; margin: 0 0 8px 0; }
.overview-chart-header { align-items: flex-start; gap: 10px; }
.kpi-delta { font-weight: 600; }
.kpi-delta.positive { color: var(--success); }
.kpi-delta.negative { color: var(--danger); }
.kpi-delta.neutral { color: var(--text-muted); }
.kpi-context-label { font-size: 0.76rem; color: var(--text-muted); }
.chart-empty-state { min-height: 160px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 16px; border: 1px dashed var(--border-color); border-radius: var(--radius-sm); background: #fbfcfe; }

.overview-transactions-caption-row { display: flex; justify-content: flex-end; margin: -4px 0 8px 0; }
.overview-transactions-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 0; }
.ov-transaction-item { align-items: center; border-left: 4px solid var(--accent-1); margin: 0; }
.ov-transaction-item.positive { border-left-color: var(--success); }
.ov-transaction-item.negative { border-left-color: var(--danger); }
.ov-transaction-rank { width: 34px; height: 34px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.76rem; font-weight: 700; margin-right: 10px; flex-shrink: 0; }
.ov-transaction-rank.positive { background: rgba(31, 169, 113, 0.12); color: var(--success); }
.ov-transaction-rank.negative { background: rgba(231, 76, 60, 0.12); color: var(--danger); }
.ov-transaction-meta { min-width: 0; width: 100%; }
.ov-transaction-name { font-size: 0.78rem; font-weight: 600; color: var(--primary-dark); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ov-transaction-detail { font-size: 0.72rem; color: var(--text-muted); line-height: 1.25; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ov-transaction-profit { font-size: 0.76rem; font-weight: 700; margin-top: 4px; }
.ov-transaction-profit.positive { color: var(--success); }
.ov-transaction-profit.negative { color: var(--danger); }
.ov-transaction-profit.neutral { color: var(--text-muted); }
.ov-transaction-slot-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.35px; font-weight: 700; margin-bottom: 3px; }
.ov-transaction-slot-label.positive { color: var(--success); }
.ov-transaction-slot-label.negative { color: var(--danger); }

.en-mobile-cards { display: none; }
.en-client-card {
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    background: #fff;
    padding: 12px;
    display: grid;
    gap: 9px;
}
.en-client-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.en-client-card-title { min-width: 0; display: flex; gap: 8px; align-items: baseline; }
.en-client-rank { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); }
.en-client-name { font-size: 0.92rem; font-weight: 600; color: var(--primary-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.en-client-metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.en-client-metric { min-width: 0; }
.en-client-metric-label { display: block; font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2px; margin-bottom: 2px; }
.en-client-metric-value { display: block; font-size: 0.84rem; font-weight: 600; color: var(--primary-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.en-client-card-foot { font-size: 0.73rem; color: var(--text-muted); display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }

.mo-mobile-cards,
.pl-mobile-cards { display: none; }

.mo-period-card,
.pl-mobile-card {
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    background: #fff;
    padding: 11px 12px;
    display: grid;
    gap: 7px;
}

.mo-period-card-head,
.pl-mobile-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}

.mo-period-card-title,
.pl-mobile-card-title {
    font-size: 0.88rem;
    font-weight: 650;
    color: var(--primary-dark);
    line-height: 1.25;
}

.mo-period-card-metrics,
.pl-mobile-card-metrics {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 7px;
}

.mo-period-card-metric,
.pl-mobile-card-metric { min-width: 0; }

.mo-period-card-label,
.pl-mobile-card-label {
    display: block;
    font-size: 0.66rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.22px;
    margin-bottom: 2px;
}

.mo-period-card-value,
.pl-mobile-card-value {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--primary-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

@media (max-width: 1024px) {
    .overview-drivers-mix-grid { grid-template-columns: 1fr; }
    .overview-driver-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .overview-transactions-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .charts-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
    .top-header { padding: 10px 20px; }
    .header-right { gap: 10px; }
    .global-filter-row-multi .exec-filter { min-width: 150px; }
}

@media (max-width: 768px) {
    .mobile-menu-btn { display: block !important; }
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main-wrapper { margin-left: 0; }

    .charts-grid, .charts-grid.cols-3, .overview-drivers-mix-grid { grid-template-columns: 1fr !important; }

    .top-header { padding: 10px 14px; align-items: flex-start; gap: 10px; }
    .header-left { width: 100%; }
    .header-left .dashboard-title { font-size: 1rem; }
    .header-left .dashboard-subtitle { display: none; }
    .header-right { width: 100%; margin-left: 0; justify-content: space-between; align-items: center; gap: 8px; }
    .global-filter { flex: 1; min-width: 0; }
    .global-filter-row { width: 100%; }
    .global-filter-label { display: none; }
    .exec-filter { width: 100%; min-width: 0; }
    .global-filter-warning { text-align: left; font-size: 0.7rem; }

    .update-info { display: none; }
    .user-profile { display: none; }
    #btn-refresh { padding: 8px 12px; font-size: 0.82rem; white-space: nowrap; }

    .views-container { padding: 16px 12px; }

    .view-header h2 { font-size: 1.08rem !important; line-height: 1.3; }
    .overview-main-headline { font-size: 1.08rem !important; }
    .overview-subheadline { font-size: 0.84rem; }
    .overview-time-note { font-size: 0.8rem; }
    .overview-driver-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .overview-insights-grid { grid-template-columns: 1fr !important; }
    .overview-transactions-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 10px !important; }
    .kpi-card { padding: 14px 12px; flex-direction: row; align-items: flex-start; text-align: left; }
    .kpi-icon { width: 38px; height: 38px; font-size: 1rem; margin-right: 10px; margin-bottom: 0; }
    .kpi-title { font-size: 0.74rem; }
    .kpi-value { font-size: 1.12rem; white-space: normal; overflow: visible; text-overflow: clip; }
    .kpi-subtitle { font-size: 0.76rem; }

    .chart-card { padding: 14px; }
    .chart-header { margin-bottom: 10px; padding-bottom: 10px; gap: 8px; flex-wrap: wrap; }
    .chart-title { font-size: 0.95rem; }
    .chart-container { min-height: 230px; }
    #view-entities .entities-kpi-grid { grid-template-columns: 1fr !important; gap: 9px !important; }
    #view-entities .entities-kpi-grid .kpi-card { padding: 12px 10px !important; }
    #view-entities .entities-kpi-grid .kpi-title { font-size: 0.69rem !important; }
    #view-entities .entities-kpi-grid .kpi-value { font-size: 1.02rem !important; }
    #view-entities .chart-header { flex-direction: column; align-items: flex-start !important; gap: 7px; }
    #view-entities .chart-header .badge { white-space: normal; line-height: 1.2; }
