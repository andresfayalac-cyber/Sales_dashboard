<style>
:root {
    --primary-dark: #021640; --primary-mid: #0066CC; --primary-light: #0099CC;
    --accent-1: #4572C4; --accent-2: #558ED5; --bg-color: #f4f6f9;
    --card-bg: #ffffff; --text-main: #021640; --text-muted: #6c757d;
    --border-color: #e2e8f0; --success: #1fa971; --warning: #f39c12; --danger: #e74c3c;
    --shadow: 0 2px 10px rgba(0,0,0,0.08); --shadow-hover: 0 5px 15px rgba(0,0,0,0.12);
    --radius: 10px; --radius-sm: 6px; --sidebar-width: 260px; --header-height: 70px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
a { text-decoration: none; color: var(--primary-mid); }
ul { list-style: none; }

.app-layout { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-width); background-color: var(--primary-dark); color: #fff; position: fixed; height: 100vh; left: 0; top: 0; z-index: 100; transition: transform 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
.sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 95; }
.sidebar-overlay.active { display: block; }

.main-wrapper { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; min-height: 100vh; transition: margin-left 0.3s ease; }
.sidebar-brand { height: var(--header-height); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.brand-icon { font-size: 1.5rem; color: var(--primary-light); margin-right: 15px; }
.brand-text h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; margin: 0; line-height: 1.2; }
.brand-text span { font-size: 0.8rem; color: var(--primary-light); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-nav { padding: 20px 0; }
.nav-item { padding: 15px 25px; display: flex; align-items: center; cursor: pointer; transition: all 0.2s ease; border-left: 4px solid transparent; color: rgba(255,255,255,0.7); }
.nav-item i { width: 25px; font-size: 1.1rem; margin-right: 10px; }
.nav-item span { font-size: 0.95rem; font-weight: 500; }
.nav-item:hover { background-color: rgba(255,255,255,0.05); color: #fff; }
.nav-item.active { background-color: rgba(255,255,255,0.1); border-left-color: var(--primary-light); color: #fff; }

.top-header { height: var(--header-height); background-color: var(--card-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 90; }
.header-left .dashboard-title { font-size: 1.2rem; font-weight: 600; color: var(--primary-dark); margin: 0; }
.header-left .dashboard-subtitle { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
.header-right { display: flex; align-items: center; gap: 20px; }
.update-info { font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; align-items: flex-end; }
.last-updated-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
#last-updated-time { font-weight: 600; color: var(--primary-dark); }
.user-profile .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--primary-mid); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,102,204,0.3); }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; border: none; outline: none; gap: 8px; }
.btn-primary { background-color: var(--primary-mid); color: #fff; }
.btn-primary:hover { background-color: var(--primary-dark); }
.btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
.btn-outline:hover { background-color: var(--bg-color); border-color: var(--primary-mid); color: var(--primary-mid); }

.views-container { flex: 1; padding: 30px; position: relative; }
.view-section { display: none; animation: fadeIn 0.4s ease; }
.view-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
.kpi-card { background-color: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; align-items: flex-start; transition: transform 0.2s ease, box-shadow 0.2s ease; border: 1px solid var(--border-color); }
.kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.kpi-icon { width: 50px; height: 50px; border-radius: var(--radius-sm); background-color: rgba(0, 102, 204, 0.1); color: var(--primary-mid); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 15px; flex-shrink: 0; }
.kpi-icon.success { background-color: rgba(31, 169, 113, 0.1); color: var(--success); }
.kpi-icon.warning { background-color: rgba(243, 156, 18, 0.1); color: var(--warning); }
.kpi-icon.danger { background-color: rgba(231, 76, 60, 0.1); color: var(--danger); }
.kpi-content { flex: 1; min-width: 0; }
.kpi-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: 600; }
.kpi-value { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kpi-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 5px; }

.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
.charts-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.charts-grid.cols-1 { grid-template-columns: 1fr; }
.chart-card { background-color: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: flex; flex-direction: column; }
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
.chart-title { font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); margin: 0; }
.chart-container { flex: 1; min-height: 300px; position: relative; }

.table-responsive { width: 100%; overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
.data-table { width: 100%; border-collapse: collapse; background-color: var(--card-bg); font-size: 0.9rem; }
.data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
.data-table th { background-color: #f8fafc; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 10; }
.data-table tbody tr:hover { background-color: #f8fafc; }
.data-table tbody tr:last-child td { border-bottom: none; }
.text-right { text-align: right !important; }
.text-center { text-align: center !important; }

.badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
.badge-success { background-color: rgba(31, 169, 113, 0.1); color: var(--success); }
.badge-warning { background-color: rgba(243, 156, 18, 0.1); color: var(--warning); }
.badge-danger { background-color: rgba(231, 76, 60, 0.1); color: var(--danger); }
.badge-primary { background-color: rgba(0, 102, 204, 0.1); color: var(--primary-mid); }

.loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(0, 102, 204, 0.2); border-top-color: var(--primary-mid); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text { color: var(--primary-dark); font-weight: 500; font-size: 1.1rem; }

.error-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 9998; display: flex; align-items: center; justify-content: center; }
.error-container.hidden { display: none; }
.error-content { background-color: var(--card-bg); padding: 30px; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 90%; }
.error-content i { font-size: 3rem; color: var(--danger); margin-bottom: 15px; }
.error-content h3 { color: var(--primary-dark); margin-bottom: 10px; }
.error-content p { color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem; }

.app-footer { padding: 20px 30px; text-align: center; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border-color); background-color: var(--card-bg); margin-top: auto; }

@media (max-width: 1024px) {
    .charts-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
    .mobile-menu-btn { display: block !important; }
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main-wrapper { margin-left: 0; }
    .charts-grid, .charts-grid.cols-3 { grid-template-columns: 1fr; }
    .header-left .dashboard-subtitle { display: none; }
    .update-info { display: none; }
    
    /* KPI Grid 2 columnas en móvil */
    .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .kpi-card { padding: 15px 10px; flex-direction: column; align-items: center; text-align: center; }
    .kpi-icon { margin-right: 0; margin-bottom: 10px; }
    .kpi-value { font-size: 1.2rem; }
}
</style>
